                  ${c.cbu ? `<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:4px">
                    <span><span style="color:var(--suave)">CBU:</span> <strong style="font-family:monospace">${c.cbu}</strong></span>
                    <button onclick="adminCopiar('${c.cbu}','CBU')" style="background:var(--azul);color:#fff;border:none;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:800;cursor:pointer">Copiar</button>
                  </div>` : ""}
                  ${c.alias ? `<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px">
                    <span><span style="color:var(--suave)">Alias:</span> <strong>${c.alias}</strong></span>
                    <button onclick="adminCopiar('${c.alias}','Alias')" style="background:var(--azul);color:#fff;border:none;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:800;cursor:pointer">Copiar</button>
                  </div>` : ""}
                </div>` : ""}
              ${c.notas ? `<div style="font-size:12px;color:var(--suave);margin-bottom:8px">📝 ${c.notas}</div>` : ""}
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                ${!["debitado","cancelado"].includes(c.estado) ? `
                  <button onclick="adminCambiarEstadoCheque('${c.id}','debitado')" style="flex:1;background:#E8F5E9;color:#2E7D32;border:1.5px solid #A5D6A7;border-radius:9px;padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer">✅ Debitado</button>
                  <button onclick="adminCambiarEstadoCheque('${c.id}','cancelado')" style="flex:1;background:#F5F5F5;color:#999;border:1.5px solid #E0E0E0;border-radius:9px;padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer">❌ Cancelar</button>
                ` : `<div style="font-size:12px;color:var(--suave);font-style:italic">Cheque ${c.estado}</div>`}
                <button onclick="adminEliminarCheque('${c.id}')" style="background:none;border:none;cursor:pointer;font-size:18px;color:#ccc;padding:6px">×</button>
              </div>
            </div>
          </div>`;
      }).join("");

  const form = `
    <div style="background:var(--blanco);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px">
      <div style="font-size:13px;font-weight:900;color:var(--azul);margin-bottom:14px">➕ Emitir cheque</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <input id="ch-dest" placeholder="Destinatario / Proveedor" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;background:var(--gris)">
        <div style="display:flex;gap:8px">
          <div style="flex:1">
            <div style="font-size:11px;color:var(--suave);font-weight:700;margin-bottom:4px;padding-left:4px">Fecha emisión</div>
            <input id="ch-emision" type="date" value="${new Date().toISOString().split("T")[0]}" style="width:100%;border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 12px;font-size:13px;font-family:inherit;outline:none;background:var(--gris);box-sizing:border-box">
          </div>
          <div style="flex:1">
            <div style="font-size:11px;color:var(--suave);font-weight:700;margin-bottom:4px;padding-left:4px">Fecha vencimiento</div>
            <input id="ch-venc" type="date" style="width:100%;border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 12px;font-size:13px;font-family:inherit;outline:none;background:var(--gris);box-sizing:border-box">
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;background:var(--gris);border:1.5px solid var(--gris-borde);border-radius:10px;padding:0 13px">
          <span style="font-size:13px;color:var(--suave);font-weight:700">$</span>
          <input id="ch-monto" type="number" min="0" placeholder="Monto" style="flex:1;border:none;outline:none;font-size:15px;font-weight:800;padding:11px 0;font-family:inherit;background:transparent">
        </div>
        <input id="ch-banco" placeholder="Banco (ej: Galicia, Nación...)" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
        <div style="font-size:12px;font-weight:800;color:var(--suave);text-transform:uppercase;letter-spacing:.5px;padding-top:4px">Datos bancarios del destinatario</div>
        <input id="ch-titular" placeholder="Nombre del titular" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
        <input id="ch-cuit" placeholder="CUIT" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
        <input id="ch-cbu" placeholder="CBU (22 dígitos)" maxlength="22" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:13px;font-family:monospace;outline:none;background:var(--gris)">
        <input id="ch-alias" placeholder="Alias (opcional)" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
        <input id="ch-notas" placeholder="Notas (opcional)" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
        <button onclick="adminGuardarCheque()" style="background:var(--azul);color:var(--amarillo);border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit">Registrar cheque</button>
      </div>
    </div>`;

  return form + resumen + lista;
}

function adminGuardarCheque() {
  const dest = document.getElementById("ch-dest")?.value?.trim();
  const monto = parseFloat(document.getElementById("ch-monto")?.value);
  const venc = document.getElementById("ch-venc")?.value;
  if (!dest || !monto || !venc) { toast("Completá destinatario, monto y fecha de vencimiento"); return; }
  const cheques = getAdminData("cheques");
  cheques.push({
    id: Date.now().toString(),
    destinatario: dest,
    fechaEmision: document.getElementById("ch-emision")?.value || "",
    vencimiento: venc,
    monto,
    banco: document.getElementById("ch-banco")?.value?.trim() || "",
    titular: document.getElementById("ch-titular")?.value?.trim() || "",
    cuit: document.getElementById("ch-cuit")?.value?.trim() || "",
    cbu: document.getElementById("ch-cbu")?.value?.trim() || "",
    alias: document.getElementById("ch-alias")?.value?.trim() || "",
    notas: document.getElementById("ch-notas")?.value?.trim() || "",
    estado: "pendiente"
  });
  saveAdminData("cheques", cheques);
  toast("✅ Cheque registrado");
  renderAdministracion();
}

function adminCambiarEstadoCheque(id, estado) {
  const cheques = getAdminData("cheques");
  const c = cheques.find(x=>x.id===id);
  if (c) { c.estado = estado; saveAdminData("cheques", cheques); renderAdministracion(); }
}

function adminEliminarCheque(id) {
  if (!confirm("¿Eliminar este cheque?")) return;
  saveAdminData("cheques", getAdminData("cheques").filter(c=>c.id!==id));
  renderAdministracion();
}

function adminCopiar(texto, label) {
  navigator.clipboard.writeText(texto).then(()=>toast(`✅ ${label} copiado`)).catch(()=>{
    const ta = document.createElement("textarea");
    ta.value = texto; document.body.appendChild(ta); ta.select(); document.execCommand("copy");
    document.body.removeChild(ta); toast(`✅ ${label} copiado`);
  });
}

// ──────────────────────────────────────────────────
// SUB-MÓDULO 3: SUELDOS
// ──────────────────────────────────────────────────
function getEmpleados() { return getAdminConfig("empleados", []); }
function saveEmpleados(e) { saveAdminConfig("empleados", e); }
function getPagosSueldos() { return getAdminData("pagos_sueldos"); }
function savePagosSueldos(p) { saveAdminData("pagos_sueldos", p); }

function renderAdminSueldos() {
  const empleados = getEmpleados();
  const pagos = getPagosSueldos();
  const hoy = new Date();
  const mesActual = hoy.getMonth();
  const anioActual = hoy.getFullYear();
  const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  // Calcular deuda acumulada por empleado
  const calcDeuda = (emp) => {
    const pagosEmp = pagos.filter(p => p.empleadoId === emp.id);
    // Recorrer todos los meses desde el primero hasta hoy
    let deudaAcum = 0;
    const mesesConDatos = [...new Set(pagosEmp.map(p=>`${p.anio}-${p.mes}`))];
    // Calcular desde primer pago o mes actual
    const fechaInicio = emp.fechaIngreso ? new Date(emp.fechaIngreso+"T12:00:00") : new Date(anioActual, mesActual, 1);
    let anioIt = fechaInicio.getFullYear(), mesIt = fechaInicio.getMonth();
    while (anioIt < anioActual || (anioIt === anioActual && mesIt <= mesActual)) {
      const salario = parseFloat(emp.salario) || 0;
      const pagado = pagosEmp.filter(p=>p.mes===mesIt && p.anio===anioIt).reduce((a,p)=>a+(parseFloat(p.monto)||0),0);
      deudaAcum += salario - pagado;
      mesIt++; if (mesIt > 11) { mesIt = 0; anioIt++; }
    }
    return deudaAcum;
  };

  const pagadoMes = (empId, mes, anio) =>
    pagos.filter(p=>p.empleadoId===empId && p.mes===mes && p.anio===anio).reduce((a,p)=>a+(parseFloat(p.monto)||0),0);

  const tarjetas = empleados.length === 0
    ? `<div class="empty"><span>👥</span>Sin empleados registrados</div>`
    : empleados.map(emp => {
        const salario = parseFloat(emp.salario) || 0;
        const pagadoActual = pagadoMes(emp.id, mesActual, anioActual);
        const restante = salario - pagadoActual;
        const deudaTotal = calcDeuda(emp);
        const pct = salario > 0 ? Math.min(100, Math.round(pagadoActual/salario*100)) : 0;
        const pagosDelMes = pagos.filter(p=>p.empleadoId===emp.id && p.mes===mesActual && p.anio===anioActual)
          .sort((a,b)=>b.fecha.localeCompare(a.fecha));

        const historial = pagosDelMes.map(p=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid var(--gris-borde);font-size:12px">
            <div>
              <div style="font-weight:700">${new Date(p.fecha+"T12:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"short"})}</div>
              <div style="color:var(--suave)">${p.metodoPago||""} ${p.notas?`· ${p.notas}`:""}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="font-weight:900;color:#2E7D32">$${num(parseFloat(p.monto)||0)}</div>
              <button onclick="adminEliminarPagoSueldo('${p.id}')" style="background:none;border:none;cursor:pointer;font-size:16px;color:#ccc">×</button>
            </div>
          </div>`).join("");

        return `
          <div style="background:var(--blanco);border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden">
            <div style="background:var(--azul);padding:14px 16px;color:#fff">
              <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <div>
                  <div style="font-size:16px;font-weight:900">${emp.nombre}</div>
                  <div style="font-size:12px;opacity:.8">${emp.rol||""}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:11px;opacity:.7">Sueldo base</div>
                  <div style="font-size:18px;font-weight:900">$${num(salario)}</div>
                  ${emp.comision ? `<div style="font-size:11px;opacity:.8">Comisión: ${emp.comision}%</div>` : ""}
                </div>
              </div>
            </div>
            <!-- Progreso del mes -->
            <div style="padding:14px 16px;border-bottom:1px solid var(--gris-borde)">
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
                <span style="font-weight:700;color:var(--texto)">${meses[mesActual]} ${anioActual}</span>
                <span style="color:${restante>0?"#E65100":"#2E7D32"};font-weight:800">${restante>0?`Resta $${num(restante)}`:"✅ Sueldo completo"}</span>
              </div>
              <div style="background:#eee;border-radius:8px;height:10px;overflow:hidden;margin-bottom:6px">
                <div style="background:${pct>=100?"#2E7D32":"var(--azul)"};width:${pct}%;height:10px;border-radius:8px;transition:width .4s"></div>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--suave)">
                <span>Pagado: <strong style="color:#2E7D32">$${num(pagadoActual)}</strong></span>
                <span>${pct}%</span>
              </div>
              ${deudaTotal > 0.01 ? `
                <div style="margin-top:8px;background:#FDECEA;border-radius:9px;padding:8px 12px;font-size:12px;color:#C62828;font-weight:700">
                  ⚠️ Deuda acumulada: $${num(Math.round(deudaTotal))}
                </div>` : deudaTotal < -0.01 ? `
                <div style="margin-top:8px;background:#E8F5E9;border-radius:9px;padding:8px 12px;font-size:12px;color:#2E7D32;font-weight:700">
                  ✅ Sin deuda pendiente (adelanto $${num(Math.abs(Math.round(deudaTotal)))})
                </div>` : ""}
            </div>
            <!-- Registrar pago -->
            <div style="padding:12px 16px;background:var(--azul-light);border-bottom:1px solid var(--gris-borde)">
              <div style="font-size:11px;font-weight:800;color:var(--azul);text-transform:uppercase;margin-bottom:8px">Registrar pago</div>
              <div style="display:flex;gap:8px">
                <div style="flex:1;display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--gris-borde);border-radius:9px;padding:0 10px">
                  <span style="font-size:12px;color:var(--suave)">$</span>
                  <input type="number" min="0" id="sp-monto-${emp.id}" placeholder="${num(Math.max(0,restante)||salario)}" style="flex:1;border:none;outline:none;font-size:14px;font-weight:800;padding:9px 0;font-family:inherit;background:transparent">
                </div>
                <select id="sp-metodo-${emp.id}" style="flex:0 0 120px;border:1.5px solid var(--gris-borde);border-radius:9px;padding:9px 8px;font-size:12px;font-family:inherit;outline:none;background:#fff">
                  <option value="Efectivo">Efectivo</option>
                  <option value="Transferencia">Transferencia</option>
                  <option value="Otro">Otro</option>
                </select>
              </div>
              <div style="display:flex;gap:8px;margin-top:8px">
                <input id="sp-notas-${emp.id}" placeholder="Notas (opcional)" style="flex:1;border:1.5px solid var(--gris-borde);border-radius:9px;padding:9px 10px;font-size:12px;font-family:inherit;outline:none;background:#fff">
                <button onclick="adminGuardarPagoSueldo('${emp.id}')" style="background:var(--azul);color:var(--amarillo);border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:900;cursor:pointer">＋ Pagar</button>
              </div>
            </div>
            <!-- Historial del mes -->
            ${pagosDelMes.length > 0 ? `
              <div style="padding:10px 0 2px">
                <div style="font-size:11px;font-weight:800;color:var(--suave);text-transform:uppercase;padding:0 16px;margin-bottom:6px">Pagos de ${meses[mesActual]}</div>
                ${historial}
              </div>` : ""}
            <!-- Botón editar empleado -->
            <div style="padding:10px 14px;display:flex;justify-content:flex-end">
              <button onclick="adminEditarEmpleado('${emp.id}')" style="background:none;border:1.5px solid var(--gris-borde);border-radius:9px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--suave)">✏️ Editar empleado</button>
            </div>
          </div>`;
      }).join("");

  const formEmpleado = `
    <div style="background:var(--blanco);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px">
      <div style="font-size:13px;font-weight:900;color:var(--azul);margin-bottom:14px">➕ Agregar empleado</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <input id="ae-nombre" placeholder="Nombre completo" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;background:var(--gris)">
        <input id="ae-rol" placeholder="Rol (ej: Vendedora, Óptico...)" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
        <div style="display:flex;gap:8px">
          <div style="flex:1;display:flex;align-items:center;gap:4px;background:var(--gris);border:1.5px solid var(--gris-borde);border-radius:10px;padding:0 12px">
            <span style="font-size:12px;color:var(--suave)">$</span>
            <input id="ae-salario" type="number" min="0" placeholder="Sueldo base" style="flex:1;border:none;outline:none;font-size:14px;font-weight:800;padding:11px 0;font-family:inherit;background:transparent">
          </div>
          <div style="flex:0 0 110px;display:flex;align-items:center;gap:4px;background:var(--gris);border:1.5px solid var(--gris-borde);border-radius:10px;padding:0 12px">
            <input id="ae-comision" type="number" min="0" max="100" step="0.5" placeholder="0" style="flex:1;border:none;outline:none;font-size:14px;font-weight:800;padding:11px 0;font-family:inherit;background:transparent">
            <span style="font-size:12px;color:var(--suave)">% com.</span>
          </div>
        </div>
        <input id="ae-ingreso" type="date" placeholder="Fecha de ingreso" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
        <button onclick="adminGuardarEmpleado()" style="background:var(--azul);color:var(--amarillo);border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit">Agregar empleado</button>
      </div>
    </div>`;

  return formEmpleado + tarjetas;
}

function adminGuardarEmpleado() {
  const nombre = document.getElementById("ae-nombre")?.value?.trim();
  const salario = parseFloat(document.getElementById("ae-salario")?.value);
  if (!nombre || !salario) { toast("Completá nombre y sueldo"); return; }
  const emps = getEmpleados();
  emps.push({
    id: Date.now().toString(),
    nombre,
    rol: document.getElementById("ae-rol")?.value?.trim() || "",
    salario,
    comision: parseFloat(document.getElementById("ae-comision")?.value) || 0,
    fechaIngreso: document.getElementById("ae-ingreso")?.value || new Date().toISOString().split("T")[0]
  });
  saveEmpleados(emps);
  toast("✅ Empleado agregado");
  renderAdministracion();
}

function adminGuardarPagoSueldo(empId) {
  const monto = parseFloat(document.getElementById(`sp-monto-${empId}`)?.value);
  if (!monto) { toast("Ingresá un monto"); return; }
  const pagos = getPagosSueldos();
  const hoy = new Date();
  pagos.push({
    id: Date.now().toString(),
    empleadoId: empId,
    fecha: hoy.toISOString().split("T")[0],
    mes: hoy.getMonth(),
    anio: hoy.getFullYear(),
    monto,
    metodoPago: document.getElementById(`sp-metodo-${empId}`)?.value || "Efectivo",
    notas: document.getElementById(`sp-notas-${empId}`)?.value?.trim() || ""
  });
  savePagosSueldos(pagos);
  toast("✅ Pago registrado");
  renderAdministracion();
}

function adminEliminarPagoSueldo(id) {
  if (!confirm("¿Eliminar este pago?")) return;
  savePagosSueldos(getPagosSueldos().filter(p=>p.id!==id));
  renderAdministracion();
}

function adminEditarEmpleado(id) {
  const emps = getEmpleados();
  const emp = emps.find(e=>e.id===id);
  if (!emp) return;
  document.getElementById("modal-body").innerHTML = `
    <div style="font-size:16px;font-weight:900;color:var(--azul);margin-bottom:16px">✏️ Editar empleado</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input id="ee-nombre" value="${emp.nombre||""}" placeholder="Nombre" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;background:var(--gris)">
      <input id="ee-rol" value="${emp.rol||""}" placeholder="Rol" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
      <div style="display:flex;gap:8px">
        <div style="flex:1;display:flex;align-items:center;gap:4px;background:var(--gris);border:1.5px solid var(--gris-borde);border-radius:10px;padding:0 12px">
          <span style="font-size:12px;color:var(--suave)">$</span>
          <input id="ee-salario" type="number" value="${emp.salario||""}" placeholder="Sueldo" style="flex:1;border:none;outline:none;font-size:14px;font-weight:800;padding:11px 0;font-family:inherit;background:transparent">
        </div>
        <div style="flex:0 0 110px;display:flex;align-items:center;gap:4px;background:var(--gris);border:1.5px solid var(--gris-borde);border-radius:10px;padding:0 12px">
          <input id="ee-comision" type="number" value="${emp.comision||""}" placeholder="0" style="flex:1;border:none;outline:none;font-size:14px;font-weight:800;padding:11px 0;font-family:inherit;background:transparent">
          <span style="font-size:12px;color:var(--suave)">% com.</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button onclick="adminActualizarEmpleado('${id}')" style="flex:1;background:var(--azul);color:var(--amarillo);border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:900;cursor:pointer">Guardar</button>
        <button onclick="adminConfirmarEliminarEmpleado('${id}')" style="flex:0 0 56px;background:#FDECEA;color:#C62828;border:none;border-radius:11px;padding:13px;font-size:20px;cursor:pointer">🗑</button>
      </div>
    </div>`;
  document.getElementById("overlay").classList.add("open");
}

function adminActualizarEmpleado(id) {
  const emps = getEmpleados();
  const emp = emps.find(e=>e.id===id);
  if (!emp) return;
  emp.nombre = document.getElementById("ee-nombre")?.value?.trim() || emp.nombre;
  emp.rol = document.getElementById("ee-rol")?.value?.trim() || emp.rol;
  emp.salario = parseFloat(document.getElementById("ee-salario")?.value) || emp.salario;
  emp.comision = parseFloat(document.getElementById("ee-comision")?.value) || 0;
  saveEmpleados(emps);
  document.getElementById("overlay").classList.remove("open");
  toast("✅ Empleado actualizado");
  renderAdministracion();
}

function adminConfirmarEliminarEmpleado(id) {
  if (!confirm("¿Eliminar empleado? Se mantendrán los pagos históricos.")) return;
  saveEmpleados(getEmpleados().filter(e=>e.id!==id));
  document.getElementById("overlay").classList.remove("open");
  renderAdministracion();
}

// SUELDOS — DARK GLASS
// ══════════════════════════════════════════════════════════════
function renderAdminSueldosDark() {
  const el = document.getElementById("sueldos-body");
  if (!el) return;
  const empleados = getEmpleados();
  const pagos = getPagosSueldos();
  const hoy = new Date();
  const mesActual = hoy.getMonth(), anioActual = hoy.getFullYear();
  const mesesFull = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  const calcDeuda = (emp) => {
    const pagosEmp = pagos.filter(p => p.empleadoId === emp.id);
    const fechaInicio = emp.fechaIngreso ? new Date(emp.fechaIngreso+"T12:00:00") : new Date(anioActual, mesActual, 1);
    let deuda = 0, anioIt = fechaInicio.getFullYear(), mesIt = fechaInicio.getMonth();
    while (anioIt < anioActual || (anioIt === anioActual && mesIt <= mesActual)) {
      const pagado = pagosEmp.filter(p=>p.mes===mesIt&&p.anio===anioIt).reduce((a,p)=>a+(parseFloat(p.monto)||0),0);
      deuda += (parseFloat(emp.salario)||0) - pagado;
      mesIt++; if (mesIt>11){mesIt=0;anioIt++;}
    }
    return deuda;
  };

  const totalMensual = empleados.reduce((a,e)=>a+(parseFloat(e.salario)||0),0);
  const totalPagadoMes = empleados.reduce((a,e)=>{
    return a + pagos.filter(p=>p.empleadoId===e.id&&p.mes===mesActual&&p.anio===anioActual).reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
  },0);
  const totalDeuda = empleados.reduce((a,e)=>a+Math.max(0,calcDeuda(e)),0);

  const tarjetas = empleados.length === 0
    ? `<div style="text-align:center;padding:50px 20px;color:rgba(255,255,255,.4)"><div style="font-size:40px;margin-bottom:12px">👥</div><div>Sin empleados registrados</div></div>`
    : empleados.map(emp => {
        const salario = parseFloat(emp.salario)||0;
        const pagadoMes = pagos.filter(p=>p.empleadoId===emp.id&&p.mes===mesActual&&p.anio===anioActual).reduce((a,p)=>a+(parseFloat(p.monto)||0),0);
        const restante = salario - pagadoMes;
        const deudaTotal = calcDeuda(emp);
        const pct = salario>0 ? Math.min(100,Math.round(pagadoMes/salario*100)) : 0;
        const pagosDelMes = pagos.filter(p=>p.empleadoId===emp.id&&p.mes===mesActual&&p.anio===anioActual).sort((a,b)=>b.fecha.localeCompare(a.fecha));

        return `
          <div style="${DG.card}">
            <!-- Header empleado -->
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
              <div>
                <div style="font-size:16px;font-weight:900;color:#fff">${emp.nombre}</div>
                <div style="font-size:12px;color:rgba(255,255,255,.5)">${emp.rol||""} ${emp.comision?`· ${emp.comision}% comisión`:""}</div>
              </div>
              <button onclick="adminEditarEmpleadoDark('${emp.id}')" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:6px 10px;font-size:12px;color:rgba(255,255,255,.7);cursor:pointer">✏️</button>
            </div>

            <!-- Barra progreso -->
            <div style="margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
                <span style="color:rgba(255,255,255,.6)">${mesesFull[mesActual]} ${anioActual}</span>
                <span style="color:${restante>0?'#FB923C':'#34D399'};font-weight:800">${restante>0?`Resta $${num(restante)}`:'✅ Completo'}</span>
              </div>
              <div style="background:rgba(255,255,255,.08);border-radius:8px;height:8px;overflow:hidden">
                <div style="background:${pct>=100?'linear-gradient(90deg,#34D399,#059669)':'linear-gradient(90deg,#4A9EFF,#1B4FA8)'};width:${pct}%;height:8px;border-radius:8px;transition:width .4s"></div>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:10px;margin-top:4px;color:rgba(255,255,255,.4)">
                <span>Pagado: <strong style="color:#4A9EFF">$${num(pagadoMes)}</strong></span>
                <span>Sueldo: <strong style="color:#fff">$${num(salario)}</strong></span>
              </div>
            </div>

            ${deudaTotal > 0.01 ? `<div style="background:rgba(198,40,40,.12);border:1px solid rgba(198,40,40,.3);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#EF5350;font-weight:700">⚠️ Deuda acumulada: $${num(Math.round(deudaTotal))}</div>` : ""}

            <!-- Registrar pago -->
            <div style="background:rgba(255,255,255,.03);border:1px solid rgba(74,158,255,.15);border-radius:12px;padding:12px;margin-bottom:10px">
              <div style="font-size:10px;font-weight:800;color:#F5E87C;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">Registrar pago</div>
              <div style="display:flex;gap:8px;margin-bottom:8px">
                <div style="flex:1;display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid rgba(74,158,255,.2);border-radius:9px;padding:0 12px">
                  <span style="font-size:12px;color:rgba(255,255,255,.4)">$</span>
                  <input type="number" id="spd-monto-${emp.id}" placeholder="${num(Math.max(0,restante)||salario)}" style="flex:1;border:none;outline:none;font-size:14px;font-weight:800;padding:9px 0;font-family:inherit;background:transparent;color:#fff">
                </div>
                <select id="spd-metodo-${emp.id}" style="flex:0 0 120px;background:rgba(15,25,50,.9);border:1px solid rgba(74,158,255,.2);border-radius:9px;padding:9px 8px;font-size:12px;font-family:inherit;outline:none;color:#fff">
                  <option>Efectivo</option>
                  <option>Transferencia</option>
                  <option>Otro</option>
                </select>
              </div>
              <div style="display:flex;gap:8px">
                <input id="spd-notas-${emp.id}" placeholder="Notas..." style="flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(74,158,255,.2);border-radius:9px;padding:9px 12px;font-size:12px;font-family:inherit;outline:none;color:#fff">
                <button onclick="adminGuardarPagoSueldoDark('${emp.id}')" style="background:linear-gradient(135deg,#1B4FA8,#2563EB);color:#F5E87C;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:900;cursor:pointer">＋</button>
              </div>
            </div>

            <!-- Historial del mes -->
            ${pagosDelMes.length > 0 ? `
              <div>
                <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Pagos de ${mesesFull[mesActual]}</div>
                ${pagosDelMes.map(p=>`
                  <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)">
                    <div>
                      <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.85)">${new Date(p.fecha+"T12:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"short"})}</div>
                      <div style="font-size:11px;color:rgba(255,255,255,.4)">${p.metodoPago||""} ${p.notas?`· ${p.notas}`:""}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px">
                      <div style="font-size:14px;font-weight:900;color:#34D399">$${num(parseFloat(p.monto)||0)}</div>
                      <button onclick="adminEliminarPagoSueldo('${p.id}');renderAdminSueldosDark()" style="background:none;border:none;cursor:pointer;font-size:16px;color:rgba(255,255,255,.2);padding:2px">×</button>
                    </div>
                  </div>`).join("")}
              </div>` : ""}
          </div>`;
      }).join("");

  const formEmpleado = `
    <div style="${DG.card}">
      ${DG.sectionTitle("➕ Agregar empleado")}
      <div style="display:flex;flex-direction:column;gap:10px">
        <div>
          ${DG.label("Nombre completo")}
          <input id="aed-nombre" placeholder="Nombre..." style="${DG.input}">
        </div>
        <div style="display:flex;gap:8px">
          <div style="flex:1">
            ${DG.label("Rol")}
            <input id="aed-rol" placeholder="Vendedora, Óptico..." style="${DG.input}">
          </div>
          <div style="flex:0 0 110px">
            ${DG.label("Comisión")}
            <div style="display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid rgba(74,158,255,.25);border-radius:10px;padding:0 12px">
              <input id="aed-comision" type="number" min="0" max="100" placeholder="0" style="flex:1;border:none;outline:none;font-size:14px;font-weight:800;padding:11px 0;font-family:inherit;background:transparent;color:#fff">
              <span style="font-size:11px;color:rgba(255,255,255,.4)">%</span>
            </div>
          </div>
        </div>
        <div>
          ${DG.label("Sueldo base")}
          <div style="display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid rgba(74,158,255,.25);border-radius:10px;padding:0 12px">
            <span style="font-size:13px;color:rgba(255,255,255,.4)">$</span>
            <input id="aed-salario" type="number" min="0" placeholder="0" style="flex:1;border:none;outline:none;font-size:15px;font-weight:800;padding:11px 0;font-family:inherit;background:transparent;color:#fff">
          </div>
        </div>
        <div>
          ${DG.label("Fecha de ingreso")}
          <input id="aed-ingreso" type="date" value="${hoy.toISOString().split('T')[0]}" style="${DG.input}">
        </div>
        <button onclick="adminGuardarEmpleadoDark()" style="${DG.btn}">Agregar empleado</button>
      </div>
    </div>`;

  const resumenKpis = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${DG.kpi("👥","Empleados",empleados.length+" personas","","#A78BFA")}
      ${DG.kpi("💰","Masa salarial","$"+num(totalMensual),"mensual","#4A9EFF")}
      ${DG.kpi("✅","Pagado este mes","$"+num(totalPagadoMes),"","#34D399")}
      ${DG.kpi("⚠️","Deuda total","$"+num(Math.round(totalDeuda)),"acumulada","#EF5350")}
    </div>`;

  el.innerHTML = DG.header("👥","Panel Admin","Sueldos") + resumenKpis + tarjetas + formEmpleado + "</div>";
}

function adminGuardarEmpleadoDark() {
  const nombre = document.getElementById("aed-nombre")?.value?.trim();
  const salario = parseFloat(document.getElementById("aed-salario")?.value);
  if (!nombre || !salario) { toast("Completá nombre y sueldo"); return; }
  const emps = getEmpleados();
  emps.push({ id:Date.now().toString(), nombre, rol:document.getElementById("aed-rol")?.value?.trim()||"", salario, comision:parseFloat(document.getElementById("aed-comision")?.value)||0, fechaIngreso:document.getElementById("aed-ingreso")?.value||new Date().toISOString().split("T")[0] });
  saveEmpleados(emps);
  toast("✅ Empleado agregado");
  renderAdminSueldosDark();
}

function adminGuardarPagoSueldoDark(empId) {
  const monto = parseFloat(document.getElementById(`spd-monto-${empId}`)?.value);
  if (!monto) { toast("Ingresá un monto"); return; }
  const pagos = getPagosSueldos();
  const hoy = new Date();
  pagos.push({ id:Date.now().toString(), empleadoId:empId, fecha:hoy.toISOString().split("T")[0], mes:hoy.getMonth(), anio:hoy.getFullYear(), monto, metodoPago:document.getElementById(`spd-metodo-${empId}`)?.value||"Efectivo", notas:document.getElementById(`spd-notas-${empId}`)?.value?.trim()||"" });
  savePagosSueldos(pagos);
  toast("✅ Pago registrado");
  renderAdminSueldosDark();
}

          <input id="eed-salario" type="number" value="${emp.salario||""}" placeholder="Sueldo" style="flex:1;border:none;outline:none;font-size:14px;font-weight:800;padding:11px 0;font-family:inherit;background:transparent">
        </div>
        <div style="flex:0 0 110px;display:flex;align-items:center;gap:4px;background:var(--gris);border:1.5px solid var(--gris-borde);border-radius:10px;padding:0 12px">
          <input id="eed-comision" type="number" value="${emp.comision||""}" placeholder="0" style="flex:1;border:none;outline:none;font-size:14px;font-weight:800;padding:11px 0;font-family:inherit;background:transparent">

      <div style="display:flex;gap:8px;margin-top:4px">

        <button onclick="if(confirm('¿Eliminar?')){saveEmpleados(getEmpleados().filter(e=>e.id!=='${id}'));document.getElementById('overlay').classList.remove('open');renderAdminSueldosDark()}" style="flex:0 0 56px;background:#FDECEA;color:#C62828;border:none;border-radius:11px;padding:13px;font-size:20px;cursor:pointer">🗑</button>
      </div>
    </div>`;
  document.getElementById("overlay").classList.add("open");

function adminActualizarEmpleadoDark(id) {
  const emps = getEmpleados();
  const emp = emps.find(e=>e.id===id);
  if (!emp) return;
  emp.nombre = document.getElementById("eed-nombre")?.value?.trim()||emp.nombre;

function renderAdminChequesDark() {
  const el = document.getElementById("cheques-body");
  if (!el) return;
  const cheques = getAdminData("cheques");
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const en7 = new Date(hoy); en7.setDate(en7.getDate()+7);
  const en30 = new Date(hoy); en30.setDate(en30.getDate()+30);

  const pendientes = cheques.filter(c=>!["debitado","cancelado"].includes(c.estado));
  const totalPend = pendientes.reduce((a,c)=>a+(parseFloat(c.monto)||0),0);
  const prox7 = pendientes.filter(c=>{const d=new Date(c.vencimiento+"T12:00:00");return d>=hoy&&d<=en7;});
  const prox30 = pendientes.filter(c=>{const d=new Date(c.vencimiento+"T12:00:00");return d>=hoy&&d<=en30;});
  const vencidos = pendientes.filter(c=>{const d=new Date(c.vencimiento+"T12:00:00");return d<hoy;});

  const badgeCheque = (c) => {
    const d = new Date(c.vencimiento+"T12:00:00");

    if (c.estado==="cancelado") return {color:"rgba(255,255,255,.3)",label:"❌ Cancelado"};
    if (d<hoy) return {color:"#EF5350",label:"🔴 Vencido"};
    const diff=Math.round((d-hoy)/(1000*60*60*24));
    if (diff===0) return {color:"#FB923C",label:"🟠 Hoy"};
    if (diff<=7) return {color:"#FBBF24",label:`⚠️ ${diff}d`};
    return {color:"#4A9EFF",label:`📅 ${diff}d`};

              <button onclick="adminEliminarCheque('${c.id}');renderAdminChequesDark()" style="background:none;border:none;cursor:pointer;font-size:18px;color:rgba(255,255,255,.15);padding:6px">×</button>

  const form = `

function renderEstadisticasDark() {
  const el = document.getElementById("estadisticas-body");
  if (!el) return;
  const hoy = new Date();
  const mes = hoy.getMonth(), anio = hoy.getFullYear();
  const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const mesesFull = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  const getOrds = (m,a) => D.orders.filter(o=>{ if(!o.fecha) return false; const d=new Date(o.fecha+"T12:00:00"); return d.getMonth()===m&&d.getFullYear()===a; });
  const curOrds = getOrds(mes,anio);
  const prevOrds = getOrds(mes===0?11:mes-1, mes===0?anio-1:anio);

  const fact = (os) => os.reduce((a,o)=>a+(parseFloat(o.total)||0),0);
  const facCur = fact(curOrds), facPrev = fact(prevOrds);
  const deltaPct = facPrev>0 ? Math.round((facCur-facPrev)/facPrev*100) : null;
  const ticketCur = curOrds.length ? facCur/curOrds.length : 0;

  // Últimos 12 meses
  const ultimos12 = Array.from({length:12},(_,i)=>{
    const offset=11-i;
    const m2=((mes-offset)+120)%12;
    const a2=anio+Math.floor((mes-offset)/12);
    const os=getOrds(m2,a2);
    return { label:meses[m2]+"'"+String(a2).slice(2), mes:m2, anio:a2, fact:fact(os), count:os.length, ticket:os.length?fact(os)/os.length:0 };
  });
  const maxFact = Math.max(...ultimos12.map(x=>x.fact),1);
  const maxCount = Math.max(...ultimos12.map(x=>x.count),1);

  // Por vendedora
  const cfg = getCfg();
  const porVend = {};
  curOrds.forEach(o=>{ const v=o.vendedora||"Sin asignar"; if(!porVend[v]) porVend[v]={count:0,fact:0}; porVend[v].count++; porVend[v].fact+=(parseFloat(o.total)||0); });
  const vendRanking = Object.entries(porVend).sort((a,b)=>b[1].fact-a[1].fact);
  const maxVendFact = vendRanking[0]?.[1]?.fact||1;

  // Por obra social
  const porOS = {};
  curOrds.forEach(o=>{ const os=o.oSocial||"Particular"; if(!porOS[os]) porOS[os]=0; porOS[os]+=(parseFloat(o.total)||0); });
  const osRanking = Object.entries(porOS).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Por forma de pago
  const porFP = {};
  curOrds.forEach(o=>{ const fp=o.formaPago||"No especificado"; if(!porFP[fp]) porFP[fp]=0; porFP[fp]+=(parseFloat(o.total)||0); });
  const fpEntries = Object.entries(porFP).sort((a,b)=>b[1]-a[1]);
  const maxFP = fpEntries[0]?.[1]||1;

  const kpis = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${DG.kpi("💰","Facturado "+mesesFull[mes],"$"+num(Math.round(facCur)), deltaPct!==null?`${deltaPct>=0?"▲":"▼"} ${Math.abs(deltaPct)}% vs mes ant.`:"","#4A9EFF")}
      ${DG.kpi("🧾","Órdenes del mes",curOrds.length+"",`vs ${prevOrds.length} mes ant.`,"#34D399")}
      ${DG.kpi("🎯","Ticket promedio","$"+num(Math.round(ticketCur)),"por orden","#A78BFA")}
      ${DG.kpi("📋","Total histórico",D.orders.length+" órdenes","","#FB923C")}
    </div>`;

  const barChart12 = `
    <div style="${DG.card}">
      ${DG.sectionTitle("📈 Facturación — últimos 12 meses")}
      <div style="overflow-x:auto;scrollbar-width:none">
        <div style="display:flex;align-items:flex-end;gap:5px;height:120px;min-width:340px">
          ${ultimos12.map((m2,i)=>`
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:26px">
              <div style="font-size:8px;font-weight:700;color:${i===11?'#F5E87C':'rgba(255,255,255,.5)'};white-space:nowrap">${m2.fact>0?'$'+num(Math.round(m2.fact/1000))+'k':''}</div>
              <div style="width:100%;background:${i===11?'linear-gradient(180deg,#4A9EFF,#1B4FA8)':'rgba(74,158,255,.15)'};border-radius:4px 4px 0 0;height:${Math.max(m2.fact/maxFact*95,m2.fact>0?3:0)}px"></div>
              <div style="font-size:8px;color:rgba(255,255,255,.65);font-weight:600;white-space:nowrap">${m2.label}</div>
            </div>`).join("")}
        </div>
      </div>
    </div>`;

  const barCount12 = `
    <div style="${DG.card}">
      ${DG.sectionTitle("🧾 Órdenes — últimos 12 meses")}
      <div style="overflow-x:auto;scrollbar-width:none">
        <div style="display:flex;align-items:flex-end;gap:5px;height:90px;min-width:340px">
          ${ultimos12.map((m2,i)=>`
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:26px">
              <div style="font-size:9px;font-weight:700;color:${i===11?'#34D399':'rgba(52,211,153,.5)'}">${m2.count||''}</div>
              <div style="width:100%;background:${i===11?'linear-gradient(180deg,#34D399,#059669)':'rgba(52,211,153,.15)'};border-radius:4px 4px 0 0;height:${Math.max(m2.count/maxCount*70,m2.count>0?3:0)}px"></div>
              <div style="font-size:8px;color:rgba(255,255,255,.65);font-weight:600">${m2.label}</div>
            </div>`).join("")}
        </div>
      </div>
    </div>`;

  const rankingVend = vendRanking.length===0 ? "" : `
    <div style="${DG.card}">
      ${DG.sectionTitle("👥 Ranking vendedoras — "+mesesFull[mes])}
      ${vendRanking.map(([v,d],i)=>`
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
            <span style="color:#fff;font-weight:700">${["🥇","🥈","🥉"][i]||"·"} ${v}</span>
            <span style="color:#F5E87C;font-weight:900">$${num(Math.round(d.fact))} <span style="color:rgba(255,255,255,.4);font-size:11px;font-weight:400">(${d.count})</span></span>
          </div>
          <div style="background:rgba(255,255,255,.08);border-radius:6px;height:6px">
            <div style="background:linear-gradient(90deg,#4A9EFF,#A78BFA);width:${Math.round(d.fact/maxVendFact*100)}%;height:6px;border-radius:6px"></div>
          </div>
        </div>`).join("")}
    </div>`;

  const rankingOS = osRanking.length===0 ? "" : `
    <div style="${DG.card}">
      ${DG.sectionTitle("🏥 Por obra social — "+mesesFull[mes])}
      ${osRanking.map(([os,v])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)">
          <span style="font-size:13px;color:rgba(255,255,255,.8)">${os}</span>
          <span style="font-size:13px;font-weight:900;color:#4A9EFF">$${num(Math.round(v))}</span>
        </div>`).join("")}
    </div>`;

  const rankingFP = fpEntries.length===0 ? "" : `
    <div style="${DG.card}">
      ${DG.sectionTitle("💳 Por forma de pago — "+mesesFull[mes])}
      ${fpEntries.map(([fp,v])=>`
        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="color:rgba(255,255,255,.8)">${fp}</span>
            <span style="font-weight:800;color:#F5E87C">$${num(Math.round(v))}</span>
          </div>
          <div style="background:rgba(255,255,255,.08);border-radius:5px;height:5px">
            <div style="background:linear-gradient(90deg,#F5E87C,#E8C900);width:${Math.round(v/maxFP*100)}%;height:5px;border-radius:5px"></div>
          </div>
        </div>`).join("")}
    </div>`;

  el.innerHTML = DG.header("📊","Panel Admin","Estadísticas") + kpis + barChart12 + barCount12 + rankingVend + rankingOS + rankingFP + "</div>";
}
</script>
</body>
</html>
