function confirmarPagoSaldo(idx) {
  const o = D.orders[idx];
  if (!o) return;
  const monto     = parseFloat(getRawMonto(document.getElementById("ps-monto"))||document.getElementById("ps-monto").value)||0;
  const pago      = document.getElementById("ps-pago")?.value||"";
  let vendedora = document.getElementById("ps-vendedora")?.value||"";
  // Si no se seleccionó vendedora, usar la de la orden original
  if (!vendedora && o.vendedora) vendedora = o.vendedora;
  if (!monto || monto <= 0) { toast("⚠ Ingresá un monto válido"); return; }

  const total   = parseFloat(o.total)||0;
  const acuenta = parseFloat(o.aCuenta)||0;
  const nuevoACuenta = Math.min(acuenta + monto, total);
  const nuevoSaldo   = total - nuevoACuenta;

  // Actualizar orden
  D.orders[idx].aCuenta   = nuevoACuenta;
  D.orders[idx].saldo     = nuevoSaldo;
  if (nuevoSaldo <= 0) {
    D.orders[idx].pagado  = true;
    D.orders[idx].saldo   = 0;
    D.orders[idx].aCuenta = total;
  }
  persist();

  // Registrar en caja del día como venta rápida tipo "saldo"
  const ventas = getCajasVentas();
  ventas.push({
    id:       "saldo_" + Date.now(),
    tipo:     "saldo",
    fecha:    getHoy(),
    hora:     new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}),
    item:     "Saldo N° " + (o.num||"") + " — " + (o.nombre||""),
    total:    monto,
    pago:     pago,
    vendedora,
    ordenIdx: idx,
    ordenId:  o.id,
    ordenFecha: o.fecha
  });
  saveCajasVentas(ventas);

  closeModal();
  renderAll();
  renderCaja();
  toast(nuevoSaldo <= 0 ? "✅ Saldo cancelado! Orden pagada" : `✅ Pago registrado · Saldo restante: $${num(nuevoSaldo)}`);
}

}

    const l = r.closest(".check-item");
    l.classList.remove("checked");
    l.querySelector(".cbox").textContent = "";
    r.checked = false;
  });
  label.classList.add("checked");
  label.querySelector("input[type=radio]").checked = true;
  label.querySelector(".cbox").textContent = "✓";
  // Llenar campo custom con el valor seleccionado
  const custom = document.getElementById("venta-item-custom");
  if (custom) custom.value = value;
}

function actualizarCamposLC() {
  const tipo = _lcTipo;
  const parBox      = document.getElementById("lc-par-box");
  const separadoBox = document.getElementById("lc-separado-box");
  const odBox       = document.getElementById("lc-od-box");
  const oiBox       = document.getElementById("lc-oi-box");
  if (!parBox || !separadoBox) return;

  if (tipo === "par") {
    parBox.style.display = "";
    separadoBox.style.display = "none";
  } else if (tipo === "od") {
    parBox.style.display = "none";
    separadoBox.style.display = "grid";
    if (odBox) { odBox.style.display = ""; odBox.querySelector("label").textContent = "Graduación OD"; }
    if (oiBox) oiBox.style.display = "none";
  } else if (tipo === "oi") {
    parBox.style.display = "none";
    separadoBox.style.display = "grid";
    if (odBox) odBox.style.display = "none";
    if (oiBox) { oiBox.style.display = ""; oiBox.querySelector("label").textContent = "Graduación OI"; }
  } else if (tipo === "2medios") {
    parBox.style.display = "none";
    separadoBox.style.display = "grid";
    if (odBox) { odBox.style.display = ""; odBox.querySelector("label").textContent = "Grad. OD (½ par)"; }
    if (oiBox) { oiBox.style.display = ""; oiBox.querySelector("label").textContent = "Grad. OI (½ par)"; }
  } else {
    parBox.style.display = "none";
    separadoBox.style.display = "none";
  }
}

function guardarVentaLC() {
  const tipo = _lcTipo;
  if (!tipo) { toast("⚠ Seleccioná la presentación"); return; }
  const marcaSel = document.getElementById("lc-marca")?.value || "";
  const marcaCustom = document.getElementById("lc-marca-custom")?.value.trim() || "";
  const marca = marcaCustom || marcaSel;
  if (!marca) { toast("⚠ Seleccioná o escribí la marca"); return; }
  const gradPar = document.getElementById("lc-grad-par")?.value || "";
  const gradOD = tipo === "par" ? gradPar : (tipo !== "oi" ? (document.getElementById("lc-grad-od")?.value || "") : "");
  const gradOI = tipo === "par" ? gradPar : (tipo !== "od" ? (document.getElementById("lc-grad-oi")?.value || "") : "");
  if (tipo === "par" && !gradPar) { toast("⚠ Seleccioná la graduación"); return; }
  if (tipo !== "par" && tipo !== "oi" && !gradOD) { toast("⚠ Seleccioná la graduación OD"); return; }
  if (tipo !== "par" && tipo !== "od" && !gradOI) { toast("⚠ Seleccioná la graduación OI"); return; }
  const precio = parseFloat(getRawMonto(document.getElementById("lc-precio"))) || parseFloat(document.getElementById("lc-precio")?.value) || 0;
  if (!precio) { toast("⚠ Ingresá el precio"); return; }
  const pago = document.getElementById("lc-pago")?.value || "";
  if (!pago) { toast("⚠ Seleccioná la forma de pago"); return; }
  const notas = document.getElementById("lc-notas")?.value.trim() || "";
  const vendedoraVenta = document.getElementById("lc-vendedora")?.value.trim() || "";

  const tipoLabel = { par:"Par completo", od:"Medio par OD", oi:"Medio par OI", "2medios":"2 medios pares" }[tipo];
  let gradDesc = "";
  if (tipo === "par" || tipo === "2medios") gradDesc = `OD ${gradOD} / OI ${gradOI}`;
  else if (tipo === "od") gradDesc = `OD ${gradOD}`;
  else if (tipo === "oi") gradDesc = `OI ${gradOI}`;

  const item = `${marca} · ${tipoLabel} · ${gradDesc}`;

  const venta = {
    id: uid(), fecha: getHoy(),
    hora: new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}),
    tipo: "lc",
    item, marca, tipoLC: tipo, gradOD, gradOI,
    precio, cantidad: 1, total: precio, pago
  };
  if (notas) venta.notas = notas;
  if (vendedoraVenta) venta.vendedora = vendedoraVenta;

  const ventas = getCajasVentas();
  ventas.push(venta);
  saveCajasVentas(ventas);
  closeModal();
  toast(`✅ LC registrada · $${num(precio)}`);
  if (document.getElementById("screen-caja")?.classList.contains("active")) renderCajaConVentas();
}

function guardarVentaRapida(tipo) {
  const itemSel = document.querySelector("input[name='venta-item']:checked")?.value || "";
  const itemCustom = document.getElementById("venta-item-custom")?.value.trim() || "";
  const item = itemCustom || itemSel;
  const precio = parseFloat(getRawMonto(document.getElementById("venta-precio"))) || parseFloat(document.getElementById("venta-precio")?.value) || 0;
  const cantidad = parseInt(document.getElementById("venta-cantidad")?.value) || 1;
  const pago = document.getElementById("venta-pago")?.value || "";
  const notas = document.getElementById("venta-notas")?.value.trim() || "";
  const vendedoraVenta = document.getElementById("venta-vendedora")?.value.trim() || "";

  if (!item) { toast("⚠ Seleccioná o escribí el producto"); return; }
  if (!precio) { toast("⚠ Ingresá el precio"); return; }
  if (!pago) { toast("⚠ Seleccioná la forma de pago"); return; }

  const total = precio * cantidad;
  const venta = {
    id: uid(),
    fecha: getHoy(),
    hora: new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}),
    tipo,
    item,
    precio,
    cantidad,
    total,
    pago
  };
  if (notas) venta.notas = notas;
  if (vendedoraVenta) venta.vendedora = vendedoraVenta;

  const ventas = getCajasVentas();
  ventas.push(venta);
  saveCajasVentas(ventas);
  closeModal();
  toast(`✅ Venta registrada · $${num(total)}`);
  // Refrescar caja si está abierta
  if (document.getElementById("screen-caja")?.classList.contains("active")) {
    renderCajaConVentas();
  }
}

function calcResumen(ordenes, cajaInfo, fecha) {
  const totalFacturado = ordenes.reduce((a,o) => a + (parseFloat(o.total)||0), 0);
  const totalCobrado   = ordenes.filter(o=>o.pagado).reduce((a,o) => a + (parseFloat(o.total)||0), 0);
  const porMedio = {};
  ordenes.filter(o=>o.pagado&&o.formaPago).forEach(o => {
    porMedio[o.formaPago] = (porMedio[o.formaPago]||0) + (parseFloat(o.total)||0);
  });
  // Sumar ventas rápidas (accesorios, taller, saldos)
  const ventasDia = getCajasVentas().filter(v => v.fecha === (fecha || getHoy()));
  const soloVentas = ventasDia.filter(v => v.tipo !== "saldo" && v.tipo !== "gasto");
  const soloSaldos = ventasDia.filter(v => v.tipo === "saldo");
  const soloGastos = ventasDia.filter(v => v.tipo === "gasto");
  const totalVentas = soloVentas.reduce((a,v) => a + (v.total||0), 0);
  const totalSaldos = soloSaldos.reduce((a,v) => a + (v.total||0), 0);
  const totalGastos = soloGastos.reduce((a,v) => a + (v.total||0), 0);
  ventasDia.filter(v=>v.tipo!=="gasto"&&v.pago&&v.pago!=="Sin cargo").forEach(v => {
    porMedio[v.pago] = (porMedio[v.pago]||0) + (v.total||0);
  });
  // Efectivo en caja = apertura + efectivo cobrado (ordenes+ventas+saldos) - gastos
  const efectivoCobrado = (porMedio["Efectivo"]||0);
  const efectivoEnCaja  = (cajaInfo?.montoApertura||0) + efectivoCobrado - totalGastos;
  return {
    totalFacturado: totalFacturado + totalVentas,
    totalCobrado:   totalCobrado + totalVentas + totalSaldos,
    porMedio, totalVentas, totalSaldos, totalGastos, efectivoEnCaja
  };
}

    fecha: getHoy(),

function seleccionarOrdenSaldo(idx, el) {
  // Destacar selección
  document.querySelectorAll("#lista-saldos-pendientes .card").forEach(c => {
    c.style.borderLeft = "4px solid #C0392B";
    c.style.background = "";
  });
  el.style.borderLeft = "4px solid #1B5E20";
  el.style.background = "#F1F8E9";

  _cobroSaldoIdx = idx;
  const o = D.orders[idx];
  const saldo = (parseFloat(o.total)||0) - (parseFloat(o.aCuenta)||0);

  document.getElementById("cobro-saldo-info").innerHTML =
    `<b>${o.nombre}</b> · N° ${o.num}<br>Saldo pendiente: <b>$${num(saldo)}</b>${o.vendedora ? ` · 👤 ${o.vendedora}` : ""}`;
  document.getElementById("cobro-saldo-monto").value = saldo;
  // Pre-asignar vendedora de la orden original
  if (o.vendedora) {
    const selVend = document.getElementById("cobro-saldo-vendedora");
    if (selVend) selVend.value = o.vendedora;
    const hint = document.getElementById("cobro-vend-hint");
    if (hint) hint.textContent = `(orden original: ${o.vendedora})`;

  setTimeout(()=>{ const m=document.getElementById("cobro-saldo-monto"); if(m) bindMontoField(m); },50);
}

function confirmarCobroSaldo() {
  const idx = _cobroSaldoIdx;
  if (idx === null || !D.orders[idx]) { toast("⚠ Seleccioná una orden"); return; }
  const o = D.orders[idx];
  const monto = parseFloat(getRawMonto(document.getElementById("cobro-saldo-monto"))||document.getElementById("cobro-saldo-monto")?.value)||0;
  const pago = document.getElementById("cobro-saldo-pago")?.value||"";
  let vendedora = document.getElementById("cobro-saldo-vendedora")?.value.trim()||"";
  if (!vendedora && o.vendedora) vendedora = o.vendedora;

  if (!monto || monto <= 0) { toast("⚠ Ingresá un monto válido"); return; }
  if (!pago) { toast("⚠ Seleccioná la forma de pago"); return; }

  const total     = parseFloat(o.total)||0;
  const acuenta   = parseFloat(o.aCuenta)||0;
  const nuevoAC   = Math.min(acuenta + monto, total);
  const nuevoSaldo = total - nuevoAC;

  // Actualizar la orden (de cualquier fecha)
  D.orders[idx].aCuenta = nuevoAC;
  D.orders[idx].saldo   = nuevoSaldo;
  if (nuevoSaldo <= 0) {
    D.orders[idx].pagado  = true;
    D.orders[idx].saldo   = 0;
    D.orders[idx].aCuenta = total;
  }
  persist();

  // Registrar el cobro en el día de HOY (no en la fecha de la orden)
  const ventas = getCajasVentas();
  ventas.push({
    id:       "saldo_" + Date.now(),
    tipo:     "saldo",
    fecha:    getHoy(),   // ← siempre hoy
    hora:     new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}),
    item:     "Saldo N° " + (o.num||"") + " — " + (o.nombre||""),
    total:    monto,
    pago,
    vendedora,
    ordenIdx: idx,
    ordenId:  o.id,
    ordenFecha: o.fecha   // guardamos la fecha original de la orden
  });
  saveCajasVentas(ventas);
  _cobroSaldoIdx = null;

  closeModal();
  renderAll();
  renderCaja();
  toast(nuevoSaldo <= 0
    ? "✅ Saldo cancelado! Orden pagada"
    : `✅ Cobro registrado · Saldo restante: $${num(nuevoSaldo)}`);
}

function renderCajasAnteriores(filtroMes) {
  const hoy = getHoy();
  const cajas = getCajas().filter(c => c.fecha !== hoy).sort((a,b) => b.fecha.localeCompare(a.fecha));
  if (!cajas.length) return `<div style="color:var(--suave);font-size:13px;padding:8px">Sin historial previo</div>`;

  const meses = [...new Set(cajas.map(c => c.fecha.slice(0,7)))].sort((a,b)=>b.localeCompare(a));
  const mesSel = filtroMes || meses[0] || "";
  const cajasFiltradas = cajas.filter(c => c.fecha.startsWith(mesSel));
  const nomMes = (ym) => { const [y,m] = ym.split("-"); return new Date(y,m-1,1).toLocaleDateString("es-AR",{month:"long",year:"numeric"}); };

  const selectorMeses = meses.length > 1 ? `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${meses.map(m => `<button onclick="renderCajasAnteroresConFiltro('${m}')"
        style="padding:5px 12px;border-radius:20px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:${m===mesSel?'var(--azul)':'var(--gris)'};color:${m===mesSel?'var(--amarillo)':'var(--suave)'}">
        ${nomMes(m)}</button>`).join("")}
    </div>` : "";

  let totalCobrado=0, totalOrdenes=0;
  cajasFiltradas.forEach(c => {
    const ordenes = D.orders.filter(o => o.fecha === c.fecha);
    const res = calcResumen(ordenes, c, c.fecha);
    totalCobrado += res.totalCobrado;
    totalOrdenes += ordenes.length;
  });

  const resumenMes = cajasFiltradas.length > 1 ? `
    <div style="background:#E8F5E9;border-radius:12px;padding:12px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center">
      <div><div style="font-size:10px;color:#2E7D32;font-weight:700;text-transform:uppercase">Días</div><div style="font-size:20px;font-weight:900;color:#1B5E20">${cajasFiltradas.length}</div></div>
      <div><div style="font-size:10px;color:#2E7D32;font-weight:700;text-transform:uppercase">Órdenes</div><div style="font-size:20px;font-weight:900;color:#1B5E20">${totalOrdenes}</div></div>
      <div><div style="font-size:10px;color:#2E7D32;font-weight:700;text-transform:uppercase">Cobrado</div><div style="font-size:16px;font-weight:900;color:#1B5E20">$${num(totalCobrado)}</div></div>
    </div>` : "";

  const tarjetas = cajasFiltradas.map(c => {
    const ordenes = D.orders.filter(o => o.fecha === c.fecha);
    const ventas = getCajasVentas().filter(v => v.fecha === c.fecha && v.tipo !== "gasto");
    const gastos = getCajasVentas().filter(v => v.fecha === c.fecha && v.tipo === "gasto");
    const res = calcResumen(ordenes, c, c.fecha);
    const estadoBadge = c.cerrada
      ? `<span style="background:#E8F5E9;color:#2E7D32;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px">🔒 Cerrada</span>`
      : `<span style="background:#FFF3E0;color:#E65100;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px">⚠ Sin cerrar</span>`;
    const arqueoIcon = c.arqueo ? (c.arqueo.diferencia===0?" ✅":c.arqueo.diferencia>0?" 📈":" 📉") : "";
    return `<div class="card" style="margin-bottom:8px;cursor:pointer" onclick="verResumenCaja('${c.fecha}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:800;font-size:14px">${fmtDate(c.fecha)}${arqueoIcon}</div>
          <div style="font-size:12px;color:var(--suave);margin-top:2px">${ordenes.length} órdenes${ventas.length?` · ${ventas.length} movs`:""}${gastos.length?` · ${gastos.length} gastos`:""} · $${num(res.totalFacturado)} facturado</div>
        </div>
        <div style="text-align:right">${estadoBadge}<div style="font-size:15px;font-weight:900;color:var(--azul);margin-top:4px">$${num(res.totalCobrado)}</div></div>
      </div>
    </div>`;
  }).join("");

  return selectorMeses + resumenMes + (cajasFiltradas.length ? tarjetas : `<div style="color:var(--suave);font-size:13px;padding:8px">Sin cajas en este período</div>`);
}

function renderCajasAnteroresConFiltro(mes) {
  const contenedor = document.getElementById("cajas-anteriores-body");
  if (contenedor) contenedor.innerHTML = renderCajasAnteriores(mes);
}

async function debugCajaSync() {
  const hoy = getHoy();
  const local = getCajas().find(c => c.fecha === hoy);
  let remota = null;
  let errorMsg = "";
  try {
    const res = await fetch(SHEETS_URL + "?t=" + Date.now());
    const rows = await res.json();
    const cajasRow = rows.find(r => Array.isArray(r) && r[0] === "CAJAS");
    if (cajasRow && cajasRow[1]) {
      const arr = JSON.parse(cajasRow[1]);
      remota = arr.find(c => c.fecha === hoy);
    } else {
      errorMsg = "⚠️ No hay fila CAJAS en el Sheet";
    }
  } catch(e) { errorMsg = "❌ Error al conectar con Sheets: " + e.message; }

  const fmt = obj => obj ? JSON.stringify(obj, null, 2) : "null";
  document.getElementById("modal-body").innerHTML = `
    <div style="font-size:16px;font-weight:900;color:var(--azul);margin-bottom:12px">🔍 Debug Caja — ${hoy}</div>
    ${errorMsg ? `<div style="background:#FFEBEE;border-radius:8px;padding:10px;margin-bottom:12px;font-size:13px;color:#C62828">${errorMsg}</div>` : ""}
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:800;color:var(--suave);text-transform:uppercase;margin-bottom:4px">📱 Local (este dispositivo)</div>
      <pre style="background:#F5F5F5;border-radius:8px;padding:10px;font-size:11px;overflow-x:auto;white-space:pre-wrap">${fmt(local)}</pre>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:800;color:var(--suave);text-transform:uppercase;margin-bottom:4px">☁️ Google Sheets (remota)</div>
      <pre style="background:#F5F5F5;border-radius:8px;padding:10px;font-size:11px;overflow-x:auto;white-space:pre-wrap">${fmt(remota)}</pre>
    </div>
    <div style="font-size:11px;color:var(--suave);margin-bottom:12px">
      ${local && remota ? (local.updatedAt > (remota.updatedAt||0) ? "⬆️ Local es más reciente" : local.updatedAt < (remota.updatedAt||0) ? "⬇️ Remota es más reciente" : "⚠️ Sin timestamps para comparar") : ""}
    </div>
    <button class="btn-cancel" onclick="closeModal()">Cerrar</button>
  `;
  document.getElementById("overlay").classList.add("open");
}

function verHistorialCajas(filtroMes) {
  // Incluye HOY también (bug anterior la excluía)
  const cajas = getCajas().sort((a,b) => b.fecha.localeCompare(a.fecha));
  const meses = [...new Set(cajas.map(c => c.fecha.slice(0,7)))].sort((a,b) => b.localeCompare(a));
  // Por defecto muestra el mes actual
  const mesActual = getHoy().slice(0,7);
  const mesSel = filtroMes !== undefined ? filtroMes : (meses.includes(mesActual) ? mesActual : (meses[0] || ""));
  const nomMes = (ym) => {
    if (!ym) return "Todo";
    const [y,m] = ym.split("-");
    return new Date(y, m-1, 1).toLocaleDateString("es-AR", {month:"long", year:"numeric"});
  };
  const cajasFiltradas = mesSel ? cajas.filter(c => c.fecha.startsWith(mesSel)) : cajas;

  // Totales del período
  let totalCobrado=0, totalFacturado=0, totalOrdenes=0, totalGastos=0;
  cajasFiltradas.forEach(c => {
    const ordenes = D.orders.filter(o => o.fecha === c.fecha);
    const res = calcResumen(ordenes, c, c.fecha);
    totalCobrado   += res.totalCobrado||0;
    totalFacturado += res.totalFacturado||0;
    totalOrdenes   += ordenes.length;
    totalGastos    += res.totalGastos||0;

  // Selector de meses — chips horizontales
  const chips = `

      <button onclick="verHistorialCajas('')"
        style="flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:700;cursor:pointer;
          background:${mesSel===''?'var(--azul)':'#F0F0F0'};color:${mesSel===''?'var(--amarillo)':'#666'}">Todos</button>
      ${meses.map(m => `<button onclick="verHistorialCajas('${m}')"

          background:${m===mesSel?'var(--azul)':'#F0F0F0'};color:${m===mesSel?'var(--amarillo)':'#666'}">

    <div style="background:linear-gradient(135deg,#1a237e,#283593);border-radius:16px;padding:16px;margin-bottom:14px;color:#fff">
      <div style="font-size:11px;opacity:.65;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">

          <div style="font-size:28px;font-weight:900;line-height:1">${totalOrdenes}</div>
        </div>
        <div style="background:rgba(255,255,255,.1);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:10px;opacity:.65;text-transform:uppercase;margin-bottom:4px">Facturado</div>
          <div style="font-size:17px;font-weight:900;color:#FFD54F;line-height:1.2">$${num(totalFacturado)}</div>

function confirmarApertura() {
  const monto = parseFloat(getRawMonto(document.getElementById("ap-monto"))||document.getElementById("ap-monto").value)||0;
  const vendedora = document.getElementById("ap-vendedora").value.trim();
  const notas = document.getElementById("ap-notas").value.trim();
  const hoy = getHoy();
  const cajas = getCajas().filter(c => c.fecha !== hoy);
  cajas.push({ fecha:hoy, montoApertura:monto, vendedora, notas, cerrada:false, horaApertura: new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}), updatedAt: Date.now() });
  saveCajas(cajas);
  closeModal();
  renderCaja();
  toast("✅ Caja abierta!");
}

function mostrarDiferenciaCierre(esperado) {
  const contado = parseFloat(getRawMonto(document.getElementById("cierre-arqueo"))||document.getElementById("cierre-arqueo")?.value)||0;
  const el = document.getElementById("diferencia-caja");
  if (!el || !contado) return;
  const dif = contado - esperado;
  if (Math.abs(dif) < 1) {
    el.innerHTML = `<span style="color:#2E7D32">✅ Cuadra perfecto</span>`;
  } else if (dif > 0) {
    el.innerHTML = `<span style="color:#1565C0">📈 Sobrante: $${num(dif)}</span>`;
  } else {
    el.innerHTML = `<span style="color:#C62828">📉 Faltante: $${num(Math.abs(dif))}</span>`;
  }
}

function confirmarCierre(totalFacturado, totalCobrado, efectivoEsperado) {
  const hoy = getHoy();
  const dejar = parseFloat(getRawMonto(document.getElementById("cierre-dejar"))||document.getElementById("cierre-dejar")?.value)||0;
  const arqueoContado = parseFloat(getRawMonto(document.getElementById("cierre-arqueo"))||document.getElementById("cierre-arqueo")?.value)||0;
  const notasCierre = document.getElementById("cierre-notas").value.trim();
  const cajas = getCajas();
  const idx = cajas.findIndex(c => c.fecha === hoy);
  if (idx >= 0) {
    cajas[idx].cerrada = true;
    cajas[idx].horaCierre = new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
    cajas[idx].totalFacturado = totalFacturado;
    cajas[idx].totalCobrado = totalCobrado;
    cajas[idx].montoDejar = dejar;
    cajas[idx].notasCierre = notasCierre;
    cajas[idx].updatedAt = Date.now();
    if (arqueoContado) {
      cajas[idx].arqueo = {
        esperado: efectivoEsperado,
        contado: arqueoContado,
        diferencia: arqueoContado - efectivoEsperado
      };
    }
    saveCajas(cajas);
  }
  closeModal();
  renderCaja();
  toast("🔒 Caja cerrada!");
}

function guardarNotasCaja() {
  const hoy = getHoy();
  const notas = document.getElementById("caja-notas").value;
  const cajas = getCajas();
  const idx = cajas.findIndex(c => c.fecha === hoy);
  if (idx >= 0) { cajas[idx].notas = notas; saveCajas(cajas); toast("✅ Notas guardadas"); }
}

function renderFidelizacion() {
  const el = document.getElementById("fidelizacion-body");
  const hoy = new Date(); hoy.setHours(0,0,0,0);

  // Órdenes que cumplen 1 año en los próximos 30 días
  const proximas = [];
  D.orders.forEach(o => {
    if (!o.fecha) return;
    const fechaOrden = new Date(o.fecha + "T12:00:00");
    const aniversario = new Date(fechaOrden);
    aniversario.setFullYear(hoy.getFullYear());
    // Si ya pasó este año, ver el año que viene
    if (aniversario < hoy) aniversario.setFullYear(hoy.getFullYear() + 1);
    const diasRestantes = Math.ceil((aniversario - hoy) / 86400000);
    if (diasRestantes <= 30) proximas.push({ ...o, diasRestantes, aniversario });
  });
  proximas.sort((a,b) => a.diasRestantes - b.diasRestantes);

  // Cumpleaños en los próximos 30 días
  const cumples = [];
  const clientes = new Map();
  D.orders.forEach(o => {
    if (!o.fechaNac || !o.nombre) return;
    const k = o.nombre.trim().toLowerCase();
    if (!clientes.has(k)) clientes.set(k, o);
  });
  clientes.forEach(o => {
    const fn = new Date(o.fechaNac + "T12:00:00");
    const cumple = new Date(fn);
    cumple.setFullYear(hoy.getFullYear());
    if (cumple < hoy) cumple.setFullYear(hoy.getFullYear() + 1);
    const dias = Math.ceil((cumple - hoy) / 86400000);
    const edad = hoy.getFullYear() - fn.getFullYear() + (cumple.getFullYear() > hoy.getFullYear() ? 0 : 1);
    if (dias <= 30) cumples.push({ ...o, dias, cumple, edad });
  });
  cumples.sort((a,b) => a.dias - b.dias);

  const urgBadge = (dias) => {
    if (dias === 0) return `<span style="background:#C62828;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px">¡HOY!</span>`;
    if (dias <= 3) return `<span style="background:#E53935;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px">en ${dias}d</span>`;
    if (dias <= 7) return `<span style="background:#FF8F00;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px">en ${dias}d</span>`;
    return `<span style="background:#E8EFF9;color:var(--azul);font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px">en ${dias}d</span>`;
  };

  el.innerHTML = `
    ${cumples.length ? `
    <div style="font-size:11px;font-weight:800;color:var(--suave);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:0 2px">🎂 Cumpleaños próximos (30 días)</div>
    ${cumples.map(c => `
      <div class="card" style="margin-bottom:8px;border-left:4px solid #E91E63">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:16px;font-weight:800">${c.nombre}</div>
            <div style="font-size:12px;color:var(--suave);margin-top:2px">🎂 ${fmtDate(c.fechaNac)} · cumple ${c.edad} años</div>
          </div>
          ${urgBadge(c.dias)}
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">${c.cel ? `<button onclick="enviarMensajeCliente('${encodeURIComponent(c.nombre||'')}','${c.cel}')" class="btn-wa" style="padding:7px 14px;font-size:13px">📲 Elegir mensaje</button>` : ""}<button onclick="enviarMsgDirecto('cumple','${encodeURIComponent(c.nombre||'')}','${c.cel||''}')" class="btn-red" style="padding:7px 14px;font-size:13px;background:#FCE4EC;color:#C62828">🎂 Saludo rápido</button></div>
      </div>`).join("")}
    <div style="height:6px"></div>` : ""}

    <div style="font-size:11px;font-weight:800;color:var(--suave);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:0 2px">📅 Órdenes que cumplen 1 año (30 días)</div>
    ${proximas.length ? proximas.map(o => {
      const idx = D.orders.findIndex(x => x.id === o.id);
      return `<div class="card" style="margin-bottom:8px;border-left:4px solid var(--azul)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>

function gradNums(tipo) {
  const vals = [];
  const max = tipo === 'cil' ? 6 : tipo === 'add' ? 4 : 20;
  for (let v = 0.25; v <= max; v = Math.round((v + 0.25) * 100) / 100)
    vals.push(v.toFixed(2));
  return vals;
}

function gradCell(id, val, tipo) {
  const valStr = String(val || "").trim();
  let signo = "", num = "";
  if (valStr === "Neutro" || valStr === "PL") { signo = "N"; num = ""; }
  else if (valStr.startsWith("+")) { signo = "+"; num = valStr.slice(1); }
  else if (valStr.startsWith("-")) { signo = "-"; num = valStr.slice(1); }
  else if (valStr !== "" && !isNaN(parseFloat(valStr))) {
    const n = parseFloat(valStr);
    signo = n >= 0 ? "+" : "-";
    num = String(Math.abs(n));
  }
  if (num !== "") { const p = parseFloat(num.replace(",",".")); if (!isNaN(p)) num = p.toFixed(2); }

  const nums = gradNums(tipo);
  const numOpts = ['', ...nums].map(n => `<option value="${n}" ${n===num?'selected':''}>${n||'—'}</option>`).join('');

  // Estilos de botones de signo
  const bStyle = (active, color) => active
    ? `background:${color};color:#fff;font-weight:900;font-size:13px;border:none;cursor:pointer;width:26px;height:26px;border-radius:6px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.2);`
    : `background:#e8eaf0;color:#999;font-weight:900;font-size:13px;border:none;cursor:pointer;width:26px;height:26px;border-radius:6px;flex-shrink:0;`;

  const btnVacio = `<button type="button" onclick="onGradSigno('${id}','${tipo}','')"  style="${bStyle(signo==='','#888')}" title="Sin valor">—</button>`;
  const btnN     = (tipo==='esf'||tipo==='cil') ? `<button type="button" onclick="onGradSigno('${id}','${tipo}','N')"  style="${bStyle(signo==='N','#1565C0')};font-size:11px;" title="Neutro">N</button>` : '';
  const btnMenos = tipo!=='add' ? `<button type="button" onclick="onGradSigno('${id}','${tipo}','-')"  style="${bStyle(signo==='-','#C62828')}" title="Negativo">−</button>` : '';
  const btnMas   = `<button type="button" onclick="onGradSigno('${id}','${tipo}','+')"  style="${bStyle(signo==='+','#2E7D32')}" title="Positivo">+</button>`;

  return `<div class="grad-cell" id="${id}-wrap" data-signo="${signo}" style="flex-direction:column;align-items:center;gap:4px;padding:5px 2px;">
    <div style="display:flex;gap:3px;justify-content:center;">${btnVacio}${btnN}${btnMenos}${btnMas}</div>
    <div style="display:${(signo==='+'||signo==='-')?'block':'none'}" id="${id}-numrow">
      <select id="${id}" style="border:1.5px solid var(--gris-borde);border-radius:7px;background:var(--gris);font-size:13px;font-weight:700;text-align:center;padding:4px 2px;font-family:inherit;color:var(--texto);outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;width:64px;margin-top:2px;">
        ${numOpts}
      </select>
    </div>
    <div id="${id}-neutro" style="display:${signo==='N'?'block':'none'};font-size:11px;font-weight:800;color:#1565C0;padding:3px 2px;">Neutro</div>
  </div>`;
}

function onGradSigno(id, tipo, signo) {
  const wrap = document.getElementById(id+"-wrap");
  if (!wrap) return;
  // Guardar el signo en data-signo para que gGrad() lo lea de forma confiable
  wrap.setAttribute("data-signo", signo);

  const sel     = document.getElementById(id);
  const numrow  = document.getElementById(id+"-numrow");
  const neutro  = document.getElementById(id+"-neutro");

  if (numrow) numrow.style.display  = (signo==='+'||signo==='-') ? 'block' : 'none';
  if (neutro) neutro.style.display  = signo==='N' ? 'block' : 'none';
  if (sel && signo==='') sel.value = '';

  // Redibujar botones con color correcto
  const bStyle = (active, color) => active
    ? `background:${color};color:#fff;font-weight:900;font-size:13px;border:none;cursor:pointer;width:26px;height:26px;border-radius:6px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.2);`
    : `background:#e8eaf0;color:#999;font-weight:900;font-size:13px;border:none;cursor:pointer;width:26px;height:26px;border-radius:6px;flex-shrink:0;`;
  const btns = wrap.querySelectorAll("button[type=button]");
  btns.forEach(btn => {
    const label = btn.textContent.trim();
    if (label === '—') btn.style.cssText = bStyle(signo==='','#888');
    else if (label === 'N')  btn.style.cssText = bStyle(signo==='N','#1565C0') + 'font-size:11px;';
    else if (label === '−')  btn.style.cssText = bStyle(signo==='-','#C62828');
    else if (label === '+')  btn.style.cssText = bStyle(signo==='+','#2E7D32');
  });
}

function liveFormat(input) {

function bindMontoField(el) {

  el._montoBound = true;
  el.removeAttribute("type");
  el.setAttribute("inputmode","numeric");
  el.addEventListener("input", function() { liveFormat(this); });
  el.addEventListener("focus", function() {
    const raw = this.getAttribute("data-raw") || this.value.replace(/\./g,"").replace(/[^0-9]/g,"");
    this.value = raw;
  });

}
function detectarCondicion(o) {
  // Extrae el valor numérico de un campo de graduación (ej: "-2.50" → -2.5, "Neutro" → 0)
  function valNum(s) {
    if (!s || s === "" || s === "—") return null;
    if (s === "Neutro" || s === "PL") return 0;
    const n = parseFloat(s);
    return isNaN(n) ? null : n;
  }

  const esfOD = valNum(o.lEsf),  esfOI = valNum(o.lEsfI);
  const cilOD = valNum(o.lCil),  cilOI = valNum(o.lCilI);
  const addOD = valNum(o.lAdd),  addOI = valNum(o.lAddI);

  const condiciones = [];
  const ojos = [];

  // Miopía: esfera negativa en lejos
  const miopia = [];
  if (esfOD !== null && esfOD < 0) miopia.push("OD");
  if (esfOI !== null && esfOI < 0) miopia.push("OI");
  if (miopia.length) condiciones.push({ label: "Miopía", icon: "👁️", color: "#1565C0", bg: "#E3F2FD", desc: "Dificultad para ver de lejos", ojos: miopia });

  // Hipermetropía: esfera positiva en lejos
  const hiper = [];
  if (esfOD !== null && esfOD > 0) hiper.push("OD");
  if (esfOI !== null && esfOI > 0) hiper.push("OI");
  if (hiper.length) condiciones.push({ label: "Hipermetropía", icon: "🔆", color: "#2E7D32", bg: "#E8F5E9", desc: "Dificultad para ver de cerca", ojos: hiper });

  // Astigmatismo: cilindro presente (distinto de 0 y no nulo)
  const astig = [];
  if (cilOD !== null && cilOD !== 0) astig.push("OD");
  if (cilOI !== null && cilOI !== 0) astig.push("OI");
  if (astig.length) condiciones.push({ label: "Astigmatismo", icon: "🌀", color: "#6A1B9A", bg: "#F3E5F5", desc: "Curvatura irregular de la córnea", ojos: astig });

  // Presbicia: adición presente (add > 0)
  const presby = [];
  if (addOD !== null && addOD > 0) presby.push("OD");
  if (addOI !== null && addOI > 0) presby.push("OI");
  if (presby.length) condiciones.push({ label: "Presbicia", icon: "📖", color: "#E65100", bg: "#FFF3E0", desc: "Dificultad para enfocar de cerca (vista cansada)", ojos: presby });

  if (!condiciones.length) return "";

  return `<div style="margin-top:10px;display:flex;flex-direction:column;gap:7px">
    ${condiciones.map(c => `
      <div style="background:${c.bg};border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">${c.icon}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:800;color:${c.color}">${c.label}
            <span style="font-size:11px;font-weight:600;color:${c.color};opacity:.8;margin-left:6px">${c.ojos.join(" / ")}</span>
          </div>
          <div style="font-size:11px;color:${c.color};opacity:.75;margin-top:1px">${c.desc}</div>
        </div>
      </div>`).join("")}
  </div>`;
}

function signGrad(v) {
  if (!v || v === "" || v === "—") return "—";
  const n = parseFloat(String(v).replace(",","."));
  if (isNaN(n)) return v;
  if (n > 0) return "+" + v;

}
function signGradColor(v) {

// ── Calcular costo estimado de una orden ──
function calcCostoOrden(o, costosCfg) {
  let costo = 0;

  // 1. Costo de laboratorio: buscar por laboratorio y tratamiento
  const labs = costosCfg.laboratorios || [];
  const lab = labs.find(l => l.nombre && o.laboratorio &&
    l.nombre.toLowerCase().trim() === o.laboratorio.toLowerCase().trim());
  if (lab && lab.tratamientos) {
    // Buscar por tratamiento exacto
    const trat = (lab.tratamientos || []).find(t => t.nombre && o.tratamiento &&
      t.nombre.toLowerCase().trim() === o.tratamiento.toLowerCase().trim());
    if (trat) costo += parseFloat(trat.costo) || 0;
    else {
      // Fallback: usar el costo "genérico" del laboratorio si existe
      if (lab.costoBase) costo += parseFloat(lab.costoBase) || 0;
    }
  } else if (labs.length === 1 && labs[0].tratamientos) {
    // Si hay un solo lab configurado, usarlo aunque no matchee exacto
    const trat = (labs[0].tratamientos || []).find(t => t.nombre && o.tratamiento &&
      t.nombre.toLowerCase().trim() === o.tratamiento.toLowerCase().trim());
    if (trat) costo += parseFloat(trat.costo) || 0;
  }

  // 2. Costo de armazón
  const armazones = costosCfg.armazones || [];
  if (o.armazonDesc) {
    const arm = armazones.find(a => a.nombre && o.armazonDesc &&
      o.armazonDesc.toLowerCase().includes(a.nombre.toLowerCase()));
    if (arm) costo += parseFloat(arm.costo) || 0;
  }

  // 3. Costo financiero (% sobre el total)
  const cf = costosCfg.costoFinanciero || {};
  if (o.formaPago) {
    // Soporte para "Tarjeta crédito 3 cuotas s/i — Visa": buscar por base
    const fpBase = o.formaPago.includes(" — ") ? o.formaPago.split(" — ")[0] : o.formaPago;
    const pct = parseFloat(cf[fpBase] || cf[o.formaPago]) || 0;
    if (pct) costo += (parseFloat(o.total) || 0) * pct / 100;
  }

  return Math.round(costo);
}

function renderFinanzas() {
  const el = document.getElementById("finanzas-body");
  if (!el) return;

  const hoy = new Date();
  const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const mesActual  = hoy.getMonth();
  const anioActual = hoy.getFullYear();

  // Leer selecciones actuales (o defaults)
  const modo     = document.getElementById("fin-modo")?.value    || "mensual";
  const selMes   = parseInt(document.getElementById("fin-mes")?.value  ?? mesActual);
  const selAnio  = parseInt(document.getElementById("fin-anio")?.value ?? anioActual);
  const finTab   = document.getElementById("fin-tab")?.value || "resumen";

  // Años disponibles en órdenes
  const anios = [...new Set(D.orders.map(o => o.fecha ? new Date(o.fecha+"T12:00:00").getFullYear() : null).filter(Boolean))].sort((a,b)=>b-a);
  if (!anios.includes(anioActual)) anios.unshift(anioActual);

  const costosCfg = getCostosCfg();

  // ── Filtrar órdenes según modo ──
  const filtrar = (anio, mes) => D.orders.filter(o => {
    if (!o.fecha) return false;
    const d = new Date(o.fecha+"T12:00:00");
    if (modo === "anual") return d.getFullYear() === anio;
    return d.getMonth() === mes && d.getFullYear() === anio;
  });

  const ords     = filtrar(selAnio, selMes);
  const ordsPrev = modo === "anual"
    ? filtrar(selAnio - 1, selMes)
    : filtrar(selMes === 0 ? selAnio - 1 : selAnio, selMes === 0 ? 11 : selMes - 1);

  // ── Ventas rápidas del período ──
  const todasVentas = getCajasVentas();
  const filtrarV = (anio, mes) => todasVentas.filter(v => {
    if (!v.fecha) return false;
    const d = new Date(v.fecha+"T12:00:00");
    if (modo === "anual") return d.getFullYear() === anio;
    return d.getMonth() === mes && d.getFullYear() === anio;
  });
  const ventasPeriodo = filtrarV(selAnio, selMes);
  const ventasPrev    = modo === "anual"
    ? filtrarV(selAnio - 1, selMes)
    : filtrarV(selMes === 0 ? selAnio - 1 : selAnio, selMes === 0 ? 11 : selMes - 1);

  // ── Calcular métricas (usa calcCostoOrden si no hay costo manual) ──
  const calc = (os, vs) => {
    const facturadoOrdenes = os.reduce((a,o) => a + (parseFloat(o.total)||0), 0);
    const cobradoOrdenes   = os.reduce((a,o) => a + (parseFloat(o.aCuenta)||0), 0);
    const saldoPendiente   = os.reduce((a,o) => (!o.pagado ? a + (parseFloat(o.saldo)||0) : a), 0);

    // Costo: usa campo manual si existe, sino estima
    const costoLabArm = os.reduce((a,o) => {
      const manual = parseFloat(o.costo);
      if (!isNaN(manual) && manual > 0) return a + manual;
      return a + calcCostoOrden(o, costosCfg);
    }, 0);

    // IIBB: % fijo sobre facturado del período
    const pctIIBB   = parseFloat(costosCfg.iibb) || 0;
    const costoIIBB = Math.round(facturadoOrdenes * pctIIBB / 100);
    const costoOrdenes = costoLabArm + costoIIBB;

    const margenBruto  = facturadoOrdenes - costoOrdenes;
    const pctMargen    = facturadoOrdenes > 0 ? Math.round(margenBruto / facturadoOrdenes * 100) : 0;
    const tieneCostos  = costoOrdenes > 0;

    const ventasAccesorios = vs.filter(v=>v.tipo==="accesorio").reduce((a,v)=>a+(parseFloat(v.monto)||0),0);
    const ventasTaller     = vs.filter(v=>v.tipo==="taller").reduce((a,v)=>a+(parseFloat(v.monto)||0),0);
    const cobrosSaldo      = vs.filter(v=>v.tipo==="saldo").reduce((a,v)=>a+(parseFloat(v.monto)||0),0);
    const ingresoTotal     = cobradoOrdenes + ventasAccesorios + ventasTaller + cobrosSaldo;
    const cantOrdenes      = os.length;
    const ticketMedio      = cantOrdenes > 0 ? facturadoOrdenes / cantOrdenes : 0;
    const pctPagado        = facturadoOrdenes > 0 ? Math.round(cobradoOrdenes / facturadoOrdenes * 100) : 0;

    return { facturadoOrdenes, cobradoOrdenes, saldoPendiente, costoLabArm, costoIIBB, costoOrdenes,
             margenBruto, pctMargen, tieneCostos, ventasAccesorios, ventasTaller, cobrosSaldo,
             ingresoTotal, cantOrdenes, ticketMedio, pctPagado };
  };

  const cur  = calc(ords, ventasPeriodo);
  const prev = calc(ordsPrev, ventasPrev);

  const $ = (n) => `$${num(n)}`;
  const pctDelta = (c, p) => {
    if (!p || p === 0) return "";
    const d = Math.round((c - p) / p * 100);
    const col = d >= 0 ? "#2E7D32" : "#C62828";
    return `<span style="font-size:11px;font-weight:800;color:${col};margin-left:5px">${d>=0?"▲":"▼"} ${Math.abs(d)}%</span>`;
  };

  const periodoLabel = modo === "anual" ? `Año ${selAnio}` : `${meses[selMes]} ${selAnio}`;
  const prevLabel    = modo === "anual" ? `Año ${selAnio-1}` : `${meses[selMes===0?11:selMes-1]} ${selMes===0?selAnio-1:selAnio}`;

  // ─── HEADER + SELECTORES (siempre visible) ───
  const header = `
    <div style="background:var(--azul);padding:20px 16px 16px;margin:-16px -16px 0">
      <div style="color:rgba(255,255,255,.75);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">💰 Finanzas</div>
      <div style="color:#fff;font-size:18px;font-weight:900;margin-bottom:14px">${periodoLabel}</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <select id="fin-modo" onchange="renderFinanzas()" style="flex:1;border:none;border-radius:9px;padding:9px 10px;font-size:13px;font-weight:700;background:rgba(255,255,255,.15);color:#fff;font-family:inherit;outline:none;-webkit-appearance:none">
          <option value="mensual" ${modo==="mensual"?"selected":""} style="color:#000">Mensual</option>
          <option value="anual"   ${modo==="anual"?"selected":""}   style="color:#000">Anual</option>
        </select>
        ${modo==="mensual" ? `
        <select id="fin-mes" onchange="renderFinanzas()" style="flex:2;border:none;border-radius:9px;padding:9px 10px;font-size:13px;font-weight:700;background:rgba(255,255,255,.15);color:#fff;font-family:inherit;outline:none;-webkit-appearance:none">
          ${meses.map((m,i)=>`<option value="${i}" ${i===selMes?"selected":""} style="color:#000">${m}</option>`).join("")}
        </select>` : ""}
        <select id="fin-anio" onchange="renderFinanzas()" style="flex:0 0 82px;border:none;border-radius:9px;padding:9px 10px;font-size:13px;font-weight:700;background:rgba(255,255,255,.15);color:#fff;font-family:inherit;outline:none;-webkit-appearance:none">
          ${anios.map(a=>`<option value="${a}" ${a===selAnio?"selected":""} style="color:#000">${a}</option>`).join("")}
        </select>
      </div>
      <!-- Pestañas internas -->
      <div style="display:flex;gap:6px">
        ${[["resumen","📊 Resumen"],["costos","⚙️ Costos"]].map(([v,l])=>`
          <button onclick="document.getElementById('fin-tab').value='${v}';renderFinanzas()"
            style="flex:1;padding:8px 4px;border:none;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;
            background:${finTab===v?"#fff":"rgba(255,255,255,.15)"};color:${finTab===v?"var(--azul)":"#fff"};font-family:inherit">${l}</button>
        `).join("")}
      </div>
      <input type="hidden" id="fin-tab" value="${finTab}">
    </div>
    <div style="height:16px"></div>`;

  // ─── TAB RESUMEN ───
  const tabResumen = () => {
    const kpiCard = (emoji, label, valor, prevValor, sub="", color="var(--azul)") => `
      <div style="background:var(--blanco);border-radius:14px;padding:16px 14px;box-shadow:0 2px 8px rgba(0,0,0,.07);flex:1;min-width:140px">
        <div style="font-size:20px;margin-bottom:4px">${emoji}</div>
        <div style="font-size:10px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">${label}</div>
        <div style="font-size:22px;font-weight:900;color:${color};line-height:1.2">${valor}</div>
        <div style="font-size:11px;color:var(--suave);margin-top:3px">${sub}${pctDelta(parseFloat(String(valor).replace(/[^0-9.-]/g,"")), prevValor)}</div>
      </div>`;

    const barrasMensuales = () => {
      if (modo !== "anual") return "";
      const datosMes = Array(12).fill(0).map((_,i) => {
        const os = D.orders.filter(o => {
          if (!o.fecha) return false;
          const d = new Date(o.fecha+"T12:00:00");
          return d.getMonth() === i && d.getFullYear() === selAnio;
        });
        return os.reduce((a,o) => a + (parseFloat(o.total)||0), 0);
      });
      const maxVal = Math.max(...datosMes, 1);
      return `
        <div style="background:var(--blanco);border-radius:14px;padding:18px 16px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:14px">
          <div style="font-size:13px;font-weight:900;color:var(--azul);margin-bottom:14px">📊 Facturación mensual ${selAnio}</div>
          <div style="display:flex;align-items:flex-end;gap:5px;height:80px">
            ${datosMes.map((v,i) => {
              const h = maxVal > 0 ? Math.max(Math.round(v/maxVal*72), v>0?4:0) : 0;
              const esActual = i === mesActual && selAnio === anioActual;
              return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
                <div style="font-size:9px;color:var(--suave);font-weight:700">${v>0?'$'+num(v):''}</div>
                <div style="width:100%;height:${h}px;background:${esActual?"var(--azul)":"#C5D8F8"};border-radius:4px 4px 0 0;min-height:${v>0?4:0}px"></div>
                <div style="font-size:9px;color:${esActual?"var(--azul)":"var(--suave)"};font-weight:${esActual?900:600}">${meses[i].slice(0,3)}</div>
              </div>`;
            }).join("")}
          </div>
        </div>`;
    };

    const desglosePago = () => {
      const counts = {}, montos = {};
      ords.forEach(o => {
        const fp = o.formaPago || "No especificado";
        counts[fp] = (counts[fp]||0) + 1;
        montos[fp] = (montos[fp]||0) + (parseFloat(o.total)||0);
      });
      const entries = Object.entries(montos).sort((a,b)=>b[1]-a[1]);
      const maxV = entries[0]?.[1] || 1;
      if (!entries.length) return `<div style="color:var(--suave);font-size:13px;padding:8px 0">Sin datos</div>`;
      return entries.map(([k,v]) => {
        const kBase = k.includes(" — ") ? k.split(" — ")[0] : k;
        const cf = costosCfg.costoFinanciero?.[kBase] || costosCfg.costoFinanciero?.[k];
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span style="font-weight:600">${k}${cf ? `<span style="font-size:10px;color:#E65100;margin-left:4px">(+${cf}%)</span>` : ""}</span>
            <span style="font-weight:800;color:var(--azul)">${$(v)} <span style="font-size:11px;color:#999;font-weight:400">(${counts[k]})</span></span>
          </div>
          <div style="background:#eee;border-radius:6px;height:7px">
            <div style="background:var(--azul);width:${Math.round(v/maxV*100)}%;height:7px;border-radius:6px"></div>
          </div>
        </div>`;
      }).join("");
    };

    const desgloseVentas = () => [
      { label:"Órdenes cobradas", monto:cur.cobradoOrdenes, prev:prev.cobradoOrdenes, emoji:"📋" },
      { label:"Accesorios",       monto:cur.ventasAccesorios, prev:prev.ventasAccesorios, emoji:"🕶️" },
      { label:"Taller",           monto:cur.ventasTaller, prev:prev.ventasTaller, emoji:"🔧" },
      { label:"Cobros cta. cte.", monto:cur.cobrosSaldo, prev:prev.cobrosSaldo, emoji:"📒" },
    ].map(it => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gris-borde)">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px">${it.emoji}</span>
          <span style="font-size:13px;font-weight:600">${it.label}</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:900;color:var(--azul)">${$(it.monto)}</div>
          <div style="font-size:11px;color:var(--suave)">${$(it.prev)} ant.${pctDelta(it.monto, it.prev)}</div>
        </div>
      </div>`).join("");

    const hayCostosCfg = (costosCfg.laboratorios||[]).length > 0 || (costosCfg.armazones||[]).length > 0;

    return `
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        ${kpiCard("🧾","Facturado", $(cur.facturadoOrdenes), prev.facturadoOrdenes, `${cur.cantOrdenes} órdenes`)}
        ${kpiCard("💵","Cobrado", $(cur.ingresoTotal), prev.ingresoTotal, `${cur.pctPagado}% facturado`,"#2E7D32")}
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        ${kpiCard("⏳","Saldo pendiente", $(cur.saldoPendiente), prev.saldoPendiente, "por cobrar","#E65100")}
        ${kpiCard("🎫","Ticket medio", $(cur.ticketMedio), prev.ticketMedio, "por orden")}
      </div>

      ${cur.tieneCostos ? `
      <div style="background:var(--blanco);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:13px;font-weight:900;color:var(--azul)">📈 Margen bruto estimado</div>
          <div style="font-size:10px;color:var(--suave);background:var(--gris);padding:3px 8px;border-radius:20px">
            ${hayCostosCfg ? "según tabla de costos" : "costos manuales en órdenes"}
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:10px">
          <div style="flex:1;text-align:center;padding:12px 8px;background:#FDECEA;border-radius:10px">
            <div style="font-size:10px;color:#C62828;font-weight:700;text-transform:uppercase;margin-bottom:2px">Costo total</div>
            <div style="font-size:20px;font-weight:900;color:#C62828">${$(cur.costoOrdenes)}</div>
          </div>
          <div style="flex:1;text-align:center;padding:12px 8px;background:#E8F5E9;border-radius:10px">
            <div style="font-size:10px;color:#2E7D32;font-weight:700;text-transform:uppercase;margin-bottom:2px">Margen bruto</div>
            <div style="font-size:20px;font-weight:900;color:#2E7D32">${$(cur.margenBruto)}</div>
          </div>
        </div>
        ${(cur.costoLabArm > 0 || cur.costoIIBB > 0) ? `
        <div style="background:var(--gris);border-radius:9px;padding:10px 12px;margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--suave);text-transform:uppercase;margin-bottom:7px">Desglose de costos</div>
          ${cur.costoLabArm > 0 ? `<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span>🏭 Lab + armazón</span><span style="font-weight:800;color:#C62828">${$(cur.costoLabArm)}</span>
          </div>` : ""}
          ${cur.costoIIBB > 0 ? `<div style="display:flex;justify-content:space-between;font-size:13px">
            <span>🏛️ IIBB (${costosCfg.iibb}%)</span><span style="font-weight:800;color:#C62828">${$(cur.costoIIBB)}</span>
          </div>` : ""}
        </div>` : ""}
        <div style="background:#eee;border-radius:8px;height:12px;overflow:hidden">
          <div style="background:#2E7D32;width:${Math.max(0,Math.min(100,cur.pctMargen))}%;height:12px;border-radius:8px"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:5px">
          <span style="color:#C62828;font-weight:700">Costo ${100-cur.pctMargen}%</span>
          <span style="color:#2E7D32;font-weight:700">Margen ${cur.pctMargen}%</span>
        </div>
      </div>` : `
      <div style="background:#FFF8E1;border:1.5px solid #FFE082;border-radius:14px;padding:14px 16px;margin-bottom:14px">
        <div style="font-size:13px;font-weight:700;color:#795548;margin-bottom:6px">💡 Activá el cálculo de margen</div>
        <div style="font-size:12px;color:#795548;line-height:1.6">
          Configurá los costos por tratamiento y armazón en la pestaña <strong>⚙️ Costos</strong> para ver el margen bruto automáticamente — sin que las vendedoras tengan que cargar nada.
        </div>
        <button onclick="document.getElementById('fin-tab').value='costos';renderFinanzas()"
          style="margin-top:10px;background:#F57F17;color:#fff;border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:800;cursor:pointer">
          Ir a configurar costos →
        </button>
      </div>`}

      ${barrasMensuales()}

      <div style="background:var(--blanco);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:14px">
        <div style="font-size:13px;font-weight:900;color:var(--azul);margin-bottom:4px">💼 Desglose de ingresos</div>
        <div style="font-size:11px;color:var(--suave);margin-bottom:12px">vs ${prevLabel}</div>
        ${desgloseVentas()}
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0 0">
          <span style="font-size:14px;font-weight:900">Total cobrado</span>
          <span style="font-size:18px;font-weight:900;color:#2E7D32">${$(cur.ingresoTotal)}</span>
        </div>
      </div>

      <div style="background:var(--blanco);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:24px">
        <div style="font-size:13px;font-weight:900;color:var(--azul);margin-bottom:12px">💳 Facturación por forma de pago</div>
        ${desglosePago()}
      </div>`;
  };

  // ─── TAB COSTOS ───
  const tabCostos = () => {
    const cfg = getCostosCfg();
    const labs = cfg.laboratorios || [];
    const arms = cfg.armazones || [];
    const cfin = cfg.costoFinanciero || {};
    const cfgApp = getCfg();
    const todosLabs = cfgApp.laboratorios || [];
    const todosTrats = cfgApp.tratamientos || [];
    const todasFormas = cfgApp.formaPago || [];

    // Render laboratorio
    const renderLab = (lab, li) => {
      const trats = lab.tratamientos || [];
      return `
        <div style="background:var(--gris);border-radius:12px;padding:14px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-size:14px;font-weight:900;color:var(--azul)">🏭 ${lab.nombre}</div>
            <button onclick="finEliminarLab(${li})" style="background:none;border:none;cursor:pointer;font-size:18px;color:#bbb">×</button>
          </div>
          <div style="font-size:11px;font-weight:700;color:var(--suave);margin-bottom:8px;text-transform:uppercase">Costo por tratamiento</div>
          ${todosTrats.map(tr => {
            const t = trats.find(x=>x.nombre===tr) || { nombre:tr, costo:"" };
            const ti = trats.findIndex(x=>x.nombre===tr);
            return `
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
                <div style="flex:1;font-size:13px;font-weight:600;color:#333">${tr}</div>
                <div style="display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--gris-borde);border-radius:9px;padding:0 10px;width:110px">
                  <span style="font-size:12px;color:var(--suave);font-weight:700">$</span>
                  <input type="number" min="0" value="${t.costo}"
                    placeholder="0"
                    onchange="finActualizarTrat(${li},'${tr}',this.value)"
                    style="border:none;outline:none;font-size:14px;font-weight:700;width:70px;padding:8px 0;font-family:inherit;background:transparent">
                </div>
              </div>`;
          }).join("")}
        </div>`;
    };

    return `
      <div style="font-size:13px;font-weight:900;color:var(--azul);margin-bottom:4px">⚙️ Configuración de costos</div>
      <div style="font-size:12px;color:var(--suave);margin-bottom:16px;line-height:1.5">
        Estos costos son solo visibles para vos. El sistema los usa para calcular el margen bruto automáticamente en cada orden.
      </div>

      <!-- LABORATORIOS -->
      <div style="background:var(--blanco);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:14px">
        <div style="font-size:13px;font-weight:900;color:var(--azul);margin-bottom:12px">🏭 Laboratorios y costos por tratamiento</div>
        ${labs.length === 0 ? `<div style="color:var(--suave);font-size:13px;margin-bottom:12px">Aún no agregaste laboratorios.</div>` : labs.map((l,i) => renderLab(l,i)).join("")}
        ${labs.length < 5 && todosLabs.length > 0 ? `
          <div style="display:flex;gap:8px;margin-top:8px">
            <select id="fin-add-lab" style="flex:1;border:1.5px solid var(--gris-borde);border-radius:9px;padding:9px 10px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
              <option value="">— Seleccionar laboratorio —</option>
              ${todosLabs.filter(l => !labs.find(x=>x.nombre===l)).map(l=>`<option>${l}</option>`).join("")}
            </select>
            <button onclick="finAgregarLab()" style="background:var(--azul);color:var(--amarillo);border:none;border-radius:9px;padding:9px 16px;font-size:14px;font-weight:800;cursor:pointer">＋</button>
          </div>` : labs.length < 5 ? `
          <div style="display:flex;gap:8px;margin-top:8px">
            <input id="fin-add-lab-txt" placeholder="Nombre del laboratorio" style="flex:1;border:1.5px solid var(--gris-borde);border-radius:9px;padding:9px 10px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
            <button onclick="finAgregarLabTxt()" style="background:var(--azul);color:var(--amarillo);border:none;border-radius:9px;padding:9px 16px;font-size:14px;font-weight:800;cursor:pointer">＋</button>
          </div>` : ""}
      </div>

      <!-- ARMAZONES -->
      <div style="background:var(--blanco);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:14px">
        <div style="font-size:13px;font-weight:900;color:var(--azul);margin-bottom:4px">🕶️ Costo por armazón (marca/proveedor)</div>
        <div style="font-size:12px;color:var(--suave);margin-bottom:12px">El sistema busca si el campo "Armazón" de la orden contiene este texto.</div>
        ${arms.map((a,i) => `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="flex:1;font-size:13px;font-weight:700;background:var(--gris);border-radius:9px;padding:9px 12px">${a.nombre}</div>
            <div style="display:flex;align-items:center;gap:4px;background:var(--gris);border:1.5px solid var(--gris-borde);border-radius:9px;padding:0 10px;width:120px">
              <span style="font-size:12px;color:var(--suave);font-weight:700">$</span>
              <input type="number" min="0" value="${a.costo}"
                onchange="finActualizarArm(${i},this.value)"
                style="border:none;outline:none;font-size:14px;font-weight:700;width:70px;padding:8px 0;font-family:inherit;background:transparent">
            </div>
            <button onclick="finEliminarArm(${i})" style="background:none;border:none;cursor:pointer;font-size:18px;color:#bbb">×</button>
          </div>`).join("")}
        <div style="display:flex;gap:8px;margin-top:8px">
          <input id="fin-add-arm-nom" placeholder="Marca o proveedor (ej: Prada, ArmaNuevo)" style="flex:2;border:1.5px solid var(--gris-borde);border-radius:9px;padding:9px 10px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">
          <div style="display:flex;align-items:center;gap:3px;background:var(--gris);border:1.5px solid var(--gris-borde);border-radius:9px;padding:0 10px;flex:1">
            <span style="font-size:12px;color:var(--suave);font-weight:700">$</span>
            <input id="fin-add-arm-val" type="number" min="0" placeholder="0" style="border:none;outline:none;font-size:14px;font-weight:700;width:60px;padding:8px 0;font-family:inherit;background:transparent">
          </div>
          <button onclick="finAgregarArm()" style="background:var(--azul);color:var(--amarillo);border:none;border-radius:9px;padding:9px 14px;font-size:14px;font-weight:800;cursor:pointer">＋</button>
        </div>
      </div>

      <!-- COSTO FINANCIERO -->

// ── Funciones de edición de costos (llamadas desde inputs) ──
function finActualizarTrat(labIdx, tratNombre, valor) {
  const cfg = getCostosCfg();
  const lab = cfg.laboratorios[labIdx];
  if (!lab) return;
  lab.tratamientos = lab.tratamientos || [];
  const ti = lab.tratamientos.findIndex(t => t.nombre === tratNombre);
  if (ti >= 0) lab.tratamientos[ti].costo = parseFloat(valor) || 0;
  else lab.tratamientos.push({ nombre: tratNombre, costo: parseFloat(valor) || 0 });
  saveCostosCfg(cfg);
}

function finActualizarArm(idx, valor) {
  const cfg = getCostosCfg();
  if (cfg.armazones[idx]) cfg.armazones[idx].costo = parseFloat(valor) || 0;
  saveCostosCfg(cfg);
}

function finActualizarCostoFin(formaPago, valor) {
  const cfg = getCostosCfg();
  cfg.costoFinanciero = cfg.costoFinanciero || {};
  const v = parseFloat(valor);
  if (!v || v === 0) delete cfg.costoFinanciero[formaPago];
  else cfg.costoFinanciero[formaPago] = v;
  saveCostosCfg(cfg);
}

function finAgregarLab() {
  const sel = document.getElementById("fin-add-lab");
  const nombre = sel?.value?.trim();
  if (!nombre) return;
  const cfg = getCostosCfg();
  cfg.laboratorios = cfg.laboratorios || [];
  if (cfg.laboratorios.find(l => l.nombre === nombre)) return;
  cfg.laboratorios.push({ nombre, tratamientos: [] });
  saveCostosCfg(cfg);
  renderFinanzas();
}

function finAgregarLabTxt() {
  const inp = document.getElementById("fin-add-lab-txt");
  const nombre = inp?.value?.trim();
  if (!nombre) return;
  const cfg = getCostosCfg();
  cfg.laboratorios = cfg.laboratorios || [];
  if (cfg.laboratorios.find(l => l.nombre === nombre)) return;
  cfg.laboratorios.push({ nombre, tratamientos: [] });
  saveCostosCfg(cfg);
  renderFinanzas();
}

function finEliminarLab(idx) {
  const cfg = getCostosCfg();
  cfg.laboratorios.splice(idx, 1);
  saveCostosCfg(cfg);
  renderFinanzas();
}

function finAgregarArm() {
  const nom = document.getElementById("fin-add-arm-nom")?.value?.trim();
  const val = parseFloat(document.getElementById("fin-add-arm-val")?.value) || 0;
  if (!nom) return;
  const cfg = getCostosCfg();
  cfg.armazones = cfg.armazones || [];
  cfg.armazones.push({ nombre: nom, costo: val });
  saveCostosCfg(cfg);
  renderFinanzas();
}

function finEliminarArm(idx) {
  const cfg = getCostosCfg();
  cfg.armazones.splice(idx, 1);
  saveCostosCfg(cfg);
  renderFinanzas();
}

function finActualizarIIBB(valor) {
  const cfg = getCostosCfg();
  const v = parseFloat(valor);
  if (!v || v === 0) delete cfg.iibb;
  else cfg.iibb = v;
  saveCostosCfg(cfg);
  // Actualizar badge de confirmación sin re-renderizar toda la pantalla
  const badge = document.querySelector("#fin-iibb-input")?.parentElement?.parentElement;
  // Re-render para actualizar el resumen de margen
  renderFinanzas();
}

// ── Storage helpers ──
function getAdminData(key) {
  try { const s = localStorage.getItem("olvision_admin_"+key); return s ? JSON.parse(s) : []; }
  catch { return []; }
}
function saveAdminData(key, data) {
  localStorage.setItem("olvision_admin_"+key, JSON.stringify(data));
  push({ type:"SAVE_DATA", key:"ADMIN_"+key.toUpperCase(), value: JSON.stringify(data) });
}
function getAdminConfig(key, def) {
  try { const s = localStorage.getItem("olvision_admin_cfg_"+key); return s ? JSON.parse(s) : def; }
  catch { return def; }
}
function saveAdminConfig(key, data) {
  localStorage.setItem("olvision_admin_cfg_"+key, JSON.stringify(data));
  push({ type:"SAVE_DATA", key:"ADMIN_CFG_"+key.toUpperCase(), value: JSON.stringify(data) });
}

// ── Render principal ──
function renderAdministracion() {
  const el = document.getElementById("administracion-body");
  if (!el) return;
  const tab = el.dataset.tab || "proveedores";
  const tabs = [
    ["proveedores","🏭 Proveedores"],
    ["cheques","📄 Cheques"],
    ["sueldos","👥 Sueldos"]
  ];
  const tabBar = `
    <div style="display:flex;gap:6px;margin-bottom:16px">
      ${tabs.map(([v,l])=>`
        <button onclick="adminSetTab('${v}')"
          style="flex:1;padding:10px 4px;border:none;border-radius:11px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;
          background:${tab===v?"var(--azul)":"var(--blanco)"};
          color:${tab===v?"var(--amarillo)":"var(--texto)"};
          box-shadow:${tab===v?"0 3px 10px rgba(27,79,168,.3)":"0 1px 4px rgba(0,0,0,.06)"};
          border:${tab===v?"none":"1.5px solid var(--gris-borde)"}">${l}</button>
      `).join("")}
    </div>`;

  let content = "";
  if (tab === "proveedores") content = renderAdminProveedores();
  else if (tab === "cheques") content = renderAdminCheques();
  else if (tab === "sueldos") content = renderAdminSueldos();

  el.innerHTML = tabBar + content;
}

function adminSetTab(tab) {
  const el = document.getElementById("administracion-body");
  if (el) el.dataset.tab = tab;
  renderAdministracion();
}

              </div>
              <button onclick="adminEliminarPago('${p.id}')" style="background:none;border:none;cursor:pointer;font-size:18px;color:#ccc;padding:2px 4px">×</button>

  const form = `

        <input id="ap-notas" placeholder="Notas (opcional)" style="border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;outline:none;background:var(--gris)">

function adminGuardarPago() {
  const prov = document.getElementById("ap-proveedor")?.value?.trim();
  const monto = parseFloat(document.getElementById("ap-monto")?.value);
  const fecha = document.getElementById("ap-fecha")?.value;
  if (!prov || !monto || !fecha) { toast("Completá proveedor, monto y fecha"); return; }
  const pagos = getAdminData("pagos_prov");
  pagos.push({
    id: Date.now().toString(),
    proveedor: prov,
    fecha,
    monto,
    moneda: document.getElementById("ap-moneda")?.value || "ARS",
    metodoPago: document.getElementById("ap-metodo")?.value || "",
    notas: document.getElementById("ap-notas")?.value?.trim() || ""
  });
  saveAdminData("pagos_prov", pagos);
  toast("✅ Pago registrado");
  renderAdministracion();
}

function adminEliminarPago(id) {
  if (!confirm("¿Eliminar este pago?")) return;
  const pagos = getAdminData("pagos_prov").filter(p => p.id !== id);
  saveAdminData("pagos_prov", pagos);
  renderAdministracion();
}

// ──────────────────────────────────────────────────
// SUB-MÓDULO 2: CHEQUES
// ──────────────────────────────────────────────────
function renderAdminCheques() {
  const cheques = getAdminData("cheques");
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const en7 = new Date(hoy); en7.setDate(en7.getDate()+7);
  const en30 = new Date(hoy); en30.setDate(en30.getDate()+30);

  const pendientes = cheques.filter(c => !["debitado","cancelado"].includes(c.estado));
  const totalPendiente = pendientes.reduce((a,c)=>a+(parseFloat(c.monto)||0),0);
  const prox7 = pendientes.filter(c => { const d = new Date(c.vencimiento+"T12:00:00"); return d>=hoy && d<=en7; });
  const prox30 = pendientes.filter(c => { const d = new Date(c.vencimiento+"T12:00:00"); return d>=hoy && d<=en30; });
  const vencidos = pendientes.filter(c => { const d = new Date(c.vencimiento+"T12:00:00"); return d<hoy; });

  const getEstadoColor = (c) => {
    const d = new Date(c.vencimiento+"T12:00:00");
    if (c.estado==="debitado") return { bg:"#E8F5E9", txt:"#2E7D32", label:"✅ Debitado" };
    if (c.estado==="cancelado") return { bg:"#F5F5F5", txt:"#999", label:"❌ Cancelado" };
    if (d<hoy) return { bg:"#FDECEA", txt:"#C62828", label:"🔴 Vencido" };
    const diff = Math.round((d-hoy)/(1000*60*60*24));
    if (diff===0) return { bg:"#FFF3E0", txt:"#E65100", label:"🟠 Vence hoy" };
    if (diff<=7) return { bg:"#FFF8E1", txt:"#F57F17", label:`⚠️ En ${diff}d` };
    return { bg:"#E3F2FD", txt:"#1565C0", label:`📅 En ${diff}d` };
  };

  const resumen = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      <div style="background:var(--blanco);border-radius:13px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-top:3px solid #C62828">
        <div style="font-size:10px;font-weight:800;color:var(--suave);text-transform:uppercase;margin-bottom:3px">Exposición total</div>
        <div style="font-size:18px;font-weight:900;color:#C62828">$${num(totalPendiente)}</div>
        <div style="font-size:11px;color:var(--suave)">${pendientes.length} cheques</div>
      </div>
      <div style="background:var(--blanco);border-radius:13px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-top:3px solid #E65100">
        <div style="font-size:10px;font-weight:800;color:var(--suave);text-transform:uppercase;margin-bottom:3px">Próx. 7 días</div>
        <div style="font-size:18px;font-weight:900;color:#E65100">$${num(prox7.reduce((a,c)=>a+(parseFloat(c.monto)||0),0))}</div>
        <div style="font-size:11px;color:var(--suave)">${prox7.length} cheques</div>
      </div>
      <div style="background:var(--blanco);border-radius:13px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-top:3px solid #F57F17">
        <div style="font-size:10px;font-weight:800;color:var(--suave);text-transform:uppercase;margin-bottom:3px">Próx. 30 días</div>
        <div style="font-size:18px;font-weight:900;color:#F57F17">$${num(prox30.reduce((a,c)=>a+(parseFloat(c.monto)||0),0))}</div>
        <div style="font-size:11px;color:var(--suave)">${prox30.length} cheques</div>
      </div>
      <div style="background:var(--blanco);border-radius:13px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-top:3px solid #C62828">
        <div style="font-size:10px;font-weight:800;color:var(--suave);text-transform:uppercase;margin-bottom:3px">Vencidos</div>
        <div style="font-size:18px;font-weight:900;color:#C62828">$${num(vencidos.reduce((a,c)=>a+(parseFloat(c.monto)||0),0))}</div>
        <div style="font-size:11px;color:var(--suave)">${vencidos.length} cheques</div>
      </div>
    </div>`;

  const lista = cheques.length === 0
    ? `<div class="empty"><span>📄</span>Sin cheques registrados</div>`
    : [...cheques].sort((a,b) => {
        const order = {pendiente:0,proximo:1,vencido:2,debitado:3,cancelado:4};
        const da = new Date(a.vencimiento+"T12:00:00"), db = new Date(b.vencimiento+"T12:00:00");
        const ea = da<hoy && !["debitado","cancelado"].includes(a.estado) ? "vencido" : a.estado;
        const eb = db<hoy && !["debitado","cancelado"].includes(b.estado) ? "vencido" : b.estado;
        if ((order[ea]||0) !== (order[eb]||0)) return (order[ea]||0)-(order[eb]||0);
        return da-db;
      }).map(c => {

                <span>⏰ Vence: <strong style="color:${txt}">${c.vencimiento||"—"}</strong></span>
              </div>
