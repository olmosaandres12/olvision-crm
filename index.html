<title>Olvisión CRM</title>
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Olvisión CRM%22,%22short_name%22:%22Olvisión%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%231B4FA8%22,%22theme_color%22:%22%231B4FA8%22,%22icons%22:[{%22src%22:%22https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f453.png%22,%22sizes%22:%2272x72%22,%22type%22:%22image/png%22}]}">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Olvisión">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  button { font-family: inherit; }
  :root {
    --azul: #1B4FA8; --azul-dark: #143D85; --azul-light: #E8EFF9;
    --amarillo: #F5E87C; --blanco: #FFFFFF;
    --gris: #F2F5FB; --gris-borde: #C8D5EC;
    --texto: #0D1F3C; --suave: #5A6B8A;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gris); color: var(--texto); min-height: 100vh; }

  /* SIDEBAR */
  .nav-item { width:100%; display:flex; align-items:center; gap:11px; padding:11px 18px; background:none; border:none; color:rgba(255,255,255,.85); font-size:14px; font-weight:600; cursor:pointer; text-align:left; transition:all .18s; border-radius:0; font-family:inherit; }
  .nav-item:hover { background:rgba(255,255,255,.08); color:#fff; }
  .nav-item.active { background:rgba(255,255,255,.15); color:#fff; font-weight:800; border-left:3px solid var(--amarillo); }
  .nav-icon { font-size:18px; width:24px; flex-shrink:0; }

  /* MAIN LAYOUT */
  #app-layout { display:flex; min-height:100vh; }
  #main-content { flex:1; min-width:0; transition:margin-left .28s cubic-bezier(.4,0,.2,1); }

  /* DESKTOP: sidebar siempre visible */
  @media (min-width: 768px) {
    #topbar { display:none !important; }
    #sidebar { left:0 !important; }
    #sidebar-overlay { display:none !important; }
    #main-content { margin-left:260px; }
    .fab { display:none !important; }
  }

  /* MOBILE */
  @media (max-width: 767px) {
    #main-content { margin-left:0; }
    .screen { padding-top: 8px; }
  }

  /* old header replaced by sidebar */

  /* tabs replaced by sidebar */

  .screen { display: none; padding: 12px 12px 80px; }
  .screen.active { display: block; }

  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-wrap input { width: 100%; border: 1.5px solid var(--gris-borde); border-radius: 11px; padding: 11px 14px 11px 38px; font-size: 15px; background: var(--blanco); font-family: inherit; outline: none; color: var(--texto); }
  .search-wrap input:focus { border-color: var(--azul); }
  .si { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }

  .card { background: var(--blanco); border-radius: 13px; padding: 14px 15px; margin-bottom: 10px; border: 1px solid var(--gris-borde); box-shadow: 0 1px 5px rgba(27,79,168,.07); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-num { display: inline-block; background: var(--azul); color: var(--amarillo); font-size: 11px; font-weight: 800; padding: 2px 9px; border-radius: 20px; margin-bottom: 3px; }
  .card-name { font-size: 17px; font-weight: 800; }
  .card-meta { font-size: 13px; color: var(--suave); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 8px; }
  .card-actions { display: flex; gap: 7px; flex-shrink: 0; }
  .bico { width: 33px; height: 33px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .bedit { background: var(--azul-light); color: var(--azul); }
  .bdel { background: #FDECEA; color: #C0392B; }

  .grad-tbl { width: 100%; border-collapse: collapse; margin-top: 9px; font-size: 13px; }
  .grad-tbl th { background: var(--azul); color: var(--amarillo); padding: 5px 4px; font-size: 10px; text-transform: uppercase; border: 1px solid var(--azul-dark); text-align: center; }
  .grad-tbl td { border: 1px solid var(--gris-borde); padding: 5px 6px; text-align: center; }
  .grad-tbl .rlbl { background: var(--azul-light); font-weight: 800; color: var(--azul); width: 28px; font-size: 12px; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip { font-size: 12px; padding: 3px 9px; border-radius: 6px; background: var(--gris); color: var(--suave); }
  .chip-price { background: #E8F5E9; color: #2E7D32; font-weight: 700; }
  .chip-saldo { background: #FFF3E0; color: #E65100; font-weight: 700; }
  .chip-pago { background: #EDE7F6; color: #4527A0; }
  .chip-blue { background: var(--azul-light); color: var(--azul); }

  .fab { position: fixed; bottom: 20px; right: 16px; width: 58px; height: 58px; border-radius: 50%; background: var(--amarillo); color: var(--azul-dark); border: none; font-size: 28px; font-weight: 900; cursor: pointer; z-index: 200; box-shadow: 0 4px 18px rgba(27,79,168,.35); display: flex; align-items: center; justify-content: center; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(13,31,60,.6); z-index: 300; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .overlay.open { display: block; }
  .modal { background: var(--gris); border-radius: 22px 22px 0 0; padding: 16px 14px 50px; position: absolute; bottom: 0; left: 0; right: 0; max-height: 96vh; overflow-y: auto; }
  .modal-handle { width: 38px; height: 4px; background: var(--gris-borde); border-radius: 4px; margin: 0 auto 14px; }

  .orden-header { background: var(--blanco); border: 2px solid var(--azul); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .fsec { background: var(--blanco); border-radius: 13px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--gris-borde); }
  .fsec-tit { font-size: 11px; font-weight: 800; color: var(--suave); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1.5px solid var(--gris-borde); }

  .field { margin-bottom: 11px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 11px; font-weight: 700; color: var(--suave); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .6px; }
  .field input, .field select, .field textarea { width: 100%; border: 1.5px solid var(--gris-borde); border-radius: 9px; padding: 11px 12px; font-size: 15px; background: var(--gris); font-family: inherit; color: var(--texto); outline: none; -webkit-appearance: none; appearance: none; transition: border-color .15s; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--azul); background: var(--blanco); }
  .field textarea { height: 75px; resize: none; }
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }

  /* Tabla graduación en formulario */
  .gtbl-wrap { overflow-x: auto; }
  .gtbl { width: 100%; border-collapse: collapse; min-width: 300px; }
  .gtbl th { background: var(--azul); color: var(--amarillo); padding: 8px 4px; font-size: 10px; font-weight:800; text-transform: uppercase; letter-spacing: .4px; border: 1px solid var(--azul-dark); text-align: center; }
  .gtbl td { border: 1px solid var(--gris-borde); padding: 2px; vertical-align:middle; }
  .gtbl .rl { background: var(--azul-light); color: var(--azul); font-weight: 900; font-size: 14px; text-align: center; padding: 7px 4px; width: 28px; }
  .gtbl input { width: 100%; border: none; background: transparent; font-size: 14px; text-align: center; padding: 8px 3px; font-family: inherit; color: var(--texto); outline: none; }
  .gtbl input:focus { background: #EEF3FF; border-radius: 4px; }
  .grad-cell { display:flex; flex-direction:column; align-items:center; width:100%; }


  /* Checkboxes */
  .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .check-item { display: flex; align-items: center; gap: 7px; cursor: pointer; padding: 9px 10px; border-radius: 9px; border: 1.5px solid var(--gris-borde); background: var(--gris); transition: all .15s; user-select: none; }
  .check-item.checked { background: var(--azul-light); border-color: var(--azul); }
  .check-item input[type=checkbox] { display: none; }
  .cbox { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--gris-borde); background: var(--blanco); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: transparent; }
  .check-item.checked .cbox { background: var(--azul); border-color: var(--azul); color: var(--amarillo); }
  .clabel { font-size: 13px; font-weight: 600; }

  .btn-save { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--azul) 0%, #2563eb 100%); color: var(--amarillo); font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 6px; letter-spacing: .3px; transition: all .18s ease; box-shadow: 0 3px 12px rgba(27,79,168,.3); active-scale:.97; }
  .btn-save:hover { filter: brightness(1.08); box-shadow: 0 5px 18px rgba(27,79,168,.4); transform: translateY(-1px); }
  .btn-save:active { transform: scale(.97) translateY(0); box-shadow: 0 2px 8px rgba(27,79,168,.25); filter: brightness(.95); }
  .btn-cancel { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid var(--gris-borde); background: var(--blanco); color: var(--suave); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all .15s ease; }
  .btn-cancel:hover { background: var(--gris); border-color: #9AB0D4; color: var(--texto); }
  .btn-cancel:active { transform: scale(.97); background: #EBF0FA; }

  /* Botones ícono (tarjetas) */
  .bico { transition: all .15s ease; }
  .bedit:hover { background: #D0E0F5; transform: scale(1.08); }
  .bedit:active { transform: scale(.93); }
  .bdel:hover { background: #FACDCC; transform: scale(1.08); }
  .bdel:active { transform: scale(.93); }

  /* FAB flotante */
  .fab { transition: all .2s cubic-bezier(.34,1.56,.64,1); }
  .fab:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 6px 24px rgba(27,79,168,.5); }
  .fab:active { transform: scale(.92); }

  /* Nav sidebar */
  .nav-item { transition: all .15s ease; }
  .nav-item:hover { padding-left: 22px; }
  .nav-item.active { padding-left: 22px; }

  /* Clases utilitarias para botones inline */
  .btn-green { background: #E8F5E9; color: #2E7D32; border: none; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
  .btn-green:hover { background: #C8E6C9; transform: translateY(-1px); }
  .btn-green:active { transform: scale(.95); }
  .btn-wa { background: #E7F9EE; color: #25D366; border: none; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
  .btn-wa:hover { background: #C8F2D8; transform: translateY(-1px); }
  .btn-wa:active { transform: scale(.95); }
  .btn-red { background: #FDECEA; color: #C0392B; border: none; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
  .btn-red:hover { background: #FBCAC8; transform: translateY(-1px); }
  .btn-red:active { transform: scale(.95); }
  .btn-blue { background: var(--azul-light); color: var(--azul); border: none; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
  .btn-blue:hover { background: #D0E0F5; transform: translateY(-1px); }
  .btn-blue:active { transform: scale(.95); }

  #toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%); background: var(--azul-dark); color: var(--amarillo); padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 700; opacity: 0; transition: opacity .3s; z-index: 999; white-space: nowrap; pointer-events: none; }
  #toast.show { opacity: 1; }

  .empty { text-align: center; padding: 50px 20px; color: var(--suave); font-size: 15px; line-height: 1.7; }
  .empty span { font-size: 36px; display: block; margin-bottom: 10px; }
  .hist-item { border-left: 3px solid var(--azul); padding: 7px 10px; margin-bottom: 6px; background: var(--azul-light); border-radius: 0 8px 8px 0; font-size: 13px; }

  /* Botones de estado (cambiar estado de orden) */
  button[style*="border-radius:20px"] { transition: all .15s ease !important; }
  button[style*="border-radius:20px"]:hover { filter: brightness(.92); transform: scale(1.04); }
  button[style*="border-radius:20px"]:active { transform: scale(.95); }

  /* Botón "Nueva venta" en menú modal */
  .btn-nueva-opcion { background: var(--azul-light); color: var(--azul); border: 1.5px solid var(--gris-borde); border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 800; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; width: 100%; transition: all .18s ease; font-family: inherit; }
  .btn-nueva-opcion:hover { background: #D0E0F5; border-color: var(--azul); transform: translateX(3px); box-shadow: 0 2px 10px rgba(27,79,168,.15); }
  .btn-nueva-opcion:active { transform: scale(.97) translateX(0); }

  /* Mejorar botón cierre de caja y botones destructivos */
  button[style*="background:#FDECEA"] { transition: all .15s ease !important; }
  button[style*="background:#FDECEA"]:hover { filter: brightness(.92); transform: scale(1.03); }
  button[style*="background:#FDECEA"]:active { transform: scale(.95); }
  /* Admin panel dark background + glass card glow */
  #admin-panel-body { background: #080F1E; }
  #admin-tab-content [style*="backdrop-filter"] { transition: box-shadow .2s ease, border-color .2s ease; }
  #admin-tab-content [style*="backdrop-filter"]:hover {
    border-color: rgba(74,158,255,.5) !important;
    box-shadow: 0 0 0 1px rgba(74,158,255,.2), 0 8px 40px rgba(0,0,0,.5), 0 0 28px rgba(74,158,255,.14), inset 0 1px 0 rgba(255,255,255,.1) !important;
  }
  /* Modo admin: sidebar se funde con el fondo oscuro */
  body.admin-mode #sidebar {
    background: #080F1E !important;
    box-shadow: 4px 0 24px rgba(0,0,0,.5), 1px 0 0 rgba(74,158,255,.12) !important;
  }
  body.admin-mode #topbar {
    background: #080F1E !important;
    box-shadow: 0 2px 16px rgba(0,0,0,.6), 0 1px 0 rgba(74,158,255,.15) !important;
  }
  body.admin-mode #sidebar .nav-item.active {
    background: rgba(74,158,255,.15) !important;
    border-left-color: #4A9EFF !important;
  }
  body.admin-mode #sidebar .nav-item:hover {
    background: rgba(74,158,255,.09) !important;
  }
  /* Tarjetas admin con más contraste sobre el fondo */
  #admin-tab-content [style*="backdrop-filter"] {
    background: rgba(255,255,255,.09) !important;
  }
</style>
</head>

function getCfg() {
  try {
    const s = localStorage.getItem("olvision_config");
    const saved = s ? JSON.parse(s) : {};
    // Merge con defaults para garantizar que todas las claves existan
    const def = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    return Object.assign(def, saved);
  } catch { return JSON.parse(JSON.stringify(DEFAULT_CONFIG)); }
}
function saveCfg(c) {
  localStorage.setItem("olvision_config", JSON.stringify(c));
  if (c && Object.keys(c).length > 0) push({ type: "SAVE_DATA", key: "CONFIG", value: JSON.stringify(c) });
}

async function init() {
  try { const l = localStorage.getItem("olvision_v3"); if(l) D = JSON.parse(l); } catch{}
  // Activar pantalla caja como inicio
  document.querySelectorAll(".screen").forEach(x => x.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(x => x.classList.remove("active"));
  const cajaScrn = document.getElementById("screen-caja");
  if (cajaScrn) cajaScrn.classList.add("active");
  const cajaNav = document.getElementById("nav-caja");
  if (cajaNav) cajaNav.classList.add("active");
  renderAll();
  renderCaja();
  await syncSheets();
  renderCaja();
  // Auto-sync cada 5 minutos
  setInterval(syncSheets, 5 * 60 * 1000);
  // Eventos de conectividad
  window.addEventListener('online', () => { drainQueue(); syncSheets(); updateOnlineStatus(); });
  // Sync al volver de background (iPhone/Android desde otra app o pantalla apagada)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      syncSheets().then(() => {
        if (document.getElementById("screen-caja")?.classList.contains("active")) renderCaja();
      });
    }
  });
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();
}

// Indicador visual de sync
function showSyncIndicator() {
  let ind = document.getElementById("sync-indicator");
  if (!ind) {
    ind = document.createElement("div");
    ind.id = "sync-indicator";
    ind.style.cssText = "position:fixed;top:60px;right:12px;background:var(--azul);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;z-index:9999;opacity:0;transition:opacity .3s";
    ind.textContent = "🔄 Sincronizando...";
    document.body.appendChild(ind);
  }
  ind.style.opacity = "1";
  return ind;
}
function hideSyncIndicator(ok) {
  const ind = document.getElementById("sync-indicator");
  if (!ind) return;
  ind.textContent = ok ? "✅ Actualizado" : "⚠️ Sin conexión";
  ind.style.background = ok ? "#2E7D32" : "#E65100";
  setTimeout(() => { ind.style.opacity = "0"; }, 1800);
}

function updateOnlineStatus() {
  let badge = document.getElementById('online-badge');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'online-badge';
    badge.style.cssText = 'position:fixed;bottom:70px;right:12px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:800;z-index:9999;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.15)';
    document.body.appendChild(badge);
  }
  const pendientes = JSON.parse(localStorage.getItem('olvision_queue') || '[]').length;
  if (navigator.onLine) {
    badge.textContent = pendientes ? `🔄 ${pendientes} pendientes` : '🟢 En línea';
    badge.style.background = pendientes ? '#FFF3E0' : '#E8F5E9';
    badge.style.color = pendientes ? '#E65100' : '#2E7D32';
  } else {
    badge.textContent = pendientes ? `🔴 Sin conexión · ${pendientes} en cola` : '🔴 Sin conexión';
    badge.style.background = '#FDECEA';
    badge.style.color = '#C62828';
  }
}

async function syncSheets() {
  const ind = showSyncIndicator();
  try {
    const res = await fetch(SHEETS_URL + "?t=" + Date.now());
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length < 1) { hideSyncIndicator(false); return; }

    // ── Config ──
    const cfgRow = rows.find(r => Array.isArray(r) && r[0] === "CONFIG");
    if (cfgRow && cfgRow[1]) {
      try {
        const cfgRemoto = JSON.parse(cfgRow[1]);
        const merged = Object.assign(JSON.parse(JSON.stringify(DEFAULT_CONFIG)), cfgRemoto);
        localStorage.setItem("olvision_config", JSON.stringify(merged));
      } catch(e) {}
    }

    // ── Costos config ──
    const costosRow = rows.find(r => Array.isArray(r) && r[0] === "COSTOS_CONFIG");
    if (costosRow && costosRow[1]) {
      try {
        const costosRemoto = JSON.parse(costosRow[1]);
        localStorage.setItem("olvision_costos_config", JSON.stringify(costosRemoto));
      } catch(e) {}
    }

    // ── Mensajes ──
    const msgsRow = rows.find(r => Array.isArray(r) && r[0] === "MENSAJES");
    if (msgsRow && msgsRow[1]) {
      try {
        const msgsRemoto = JSON.parse(msgsRow[1]);
        if (Array.isArray(msgsRemoto) && msgsRemoto.length)
          localStorage.setItem("olvision_mensajes", JSON.stringify(msgsRemoto));
      } catch(e) {}
    }

    // ── Cajas ──
    const cajasRow = rows.find(r => Array.isArray(r) && r[0] === "CAJAS");
    if (cajasRow && cajasRow[1]) {
      try {
        const cajasRemoto = JSON.parse(cajasRow[1]);
        if (Array.isArray(cajasRemoto)) {
          const cajasLocal = getCajas();
          const localMap = {};
          cajasLocal.forEach(c => { localMap[c.fecha] = c; });
          const cajaMerged = cajasRemoto.map(cr => {
            const cl = localMap[cr.fecha];
            if (!cl) return cr; // no hay local, usar remota
            // Gana el que tiene el updatedAt más reciente
            const tsRemoto = cr.updatedAt || 0;
            const tsLocal  = cl.updatedAt || 0;
            return tsLocal > tsRemoto ? cl : cr;
          });
          const remoteFechas = new Set(cajasRemoto.map(c => c.fecha));
          // Agregar cajas locales que no están en remoto (recién creadas, aún no subidas)
          cajasLocal.forEach(cl => { if (!remoteFechas.has(cl.fecha)) cajaMerged.push(cl); });
          localStorage.setItem("olvision_cajas", JSON.stringify(cajaMerged));
        }
      } catch(e) {}
    }

    // ── Ventas rápidas / movimientos ──
    const ventasRow = rows.find(r => Array.isArray(r) && r[0] === "VENTAS");
    if (ventasRow && ventasRow[1]) {
      try {
        const ventasRemoto = JSON.parse(ventasRow[1]);
        if (Array.isArray(ventasRemoto)) {
          // Merge: usar mapa local para preservar flags _deleted que el sheet todavía no tiene
          const ventasLocalRaw = getCajasVentasRaw();
          const localMap = {};
          ventasLocalRaw.forEach(v => { localMap[v.id] = v; });
          // Para cada item remoto: si local lo marcó _deleted, preservar ese flag
          const merged = ventasRemoto.map(vr => {
            const vl = localMap[vr.id];
            if (vl && vl._deleted) return {...vr, _deleted: true}; // preservar borrado local
            return vr;
          });
          // Agregar items locales que todavía no llegaron al sheet (nuevos o recién borrados)
          const remoteIds = new Set(ventasRemoto.map(v => v.id));
          ventasLocalRaw.forEach(vl => { if (!remoteIds.has(vl.id)) merged.push(vl); });
          localStorage.setItem("olvision_ventas", JSON.stringify(merged));
          if (document.getElementById("screen-caja")?.classList.contains("active")) renderCaja();
        }
      } catch(e) {}
    }

    // ── Órdenes ──
    const orders = [];
    const dataRows = rows[0][0] === "ORDEN" ? rows : rows.slice(1);
    dataRows.forEach(r => {
      if (String(r[0]).trim() === "ORDEN") {
        // Normalizar fecha — puede venir como Date de Sheets
        let fecha = r[6] ? String(r[6]) : "";
        if (fecha && fecha.includes("Date(")) fecha = "";
        if (fecha && !fecha.includes("-") && !fecha.includes("/")) {
          // intento parsear número de serie de Excel/Sheets
          try {
            const d = new Date(fecha);
            if (!isNaN(d)) fecha = d.toISOString().slice(0,10);
            else fecha = "";
          } catch { fecha = ""; }
        }
        // Normalizar fecha ISO a YYYY-MM-DD
        const fNorm = (v) => { if(!v) return ""; const s=String(v); if(s.includes("T")) return s.slice(0,10); return s; };
        // Limpiar tipos: sacar "on", tipoTrabajo duplicado
        const tiposRaw = String(r[30]||"");
        const tipoTrabajo = String(r[29]||"");
        const TIPOS_VALIDOS = ["Monofocales","Bifocales","Progresivo","Ocupacional","Alto Índice","Armazon Nuevo","Armazon Usado"];
        const tipos = tiposRaw.split(",").filter(t => TIPOS_VALIDOS.includes(t.trim())).join(",");
        orders.push({
          id:    String(r[1]||uid()),
          num:   String(r[2]||""),
          nombre:String(r[3]||""),
          dni:   String(r[4]||""),
          dir:   String(r[5]||""),
          fecha: fNorm(r[6]),
          edad:  String(r[7]||""),
          fechaNac: fNorm(r[8]),
          cel:   String(r[9]||""),
          laboratorio:String(r[10]||""),
          doctor:String(r[11]||""),
          oSocial:String(r[12]||""),
          lEsf:String(r[13]||""),lCil:String(r[14]||""),lEje:String(r[15]||""),lAdd:String(r[16]||""),
          lEsfI:String(r[17]||""),lCilI:String(r[18]||""),lEjeI:String(r[19]||""),lAddI:String(r[20]||""),
          cEsf:String(r[21]||""),cCil:String(r[22]||""),cEje:String(r[23]||""),cAdd:String(r[24]||""),
          cEsfI:String(r[25]||""),cCilI:String(r[26]||""),cEjeI:String(r[27]||""),cAddI:String(r[28]||""),
          tipoTrabajo,
          tipos,
          tratamiento:String(r[31]||""),
          armazonDesc:String(r[32]||""),
          pamiOpciones:r[33]?String(r[33]).split(",").filter(Boolean):[],
          total:String(r[34]||""),
          aCuenta:String(r[35]||""),
          saldo:String(r[36]||""),
          formaPago:String(r[37]||""),
          pagado: r[38]===true || String(r[38])==="true",
          ctaCte: r[39]===true || String(r[39])==="true",
          notas:String(r[40]||""),
          estado:String(r[41]||"") || "pendiente_envio",
          fechaEntrega:fNorm(r[42]),
          vendedora:String(r[43]||""),
          costo:String(r[44]||""),
          retirado: r[45]===true || String(r[45])==="true",
          updatedAt: r[46] ? Number(r[46]) : 0
        });
      }
    });
    // Re-render caja si hubo cambios en cajas remotas
    if (cajasRow && cajasRow[1]) {
      if (document.getElementById("screen-caja")?.classList.contains("active")) renderCaja();
    }

    if (orders.length) {
      // Merge: si la versión local tiene updatedAt más reciente que la remota,
      // conservar TODOS los campos locales (el sheet aún no recibió ese cambio).
      // Esto resuelve el conflicto entre dispositivos distintos.
      const localMap = {};
      (D.orders||[]).forEach(o => { localMap[o.id] = o; });
      const mergedOrders = orders.map(o => {
        const local = localMap[o.id];
        if (local && local.updatedAt && o.updatedAt) {
          // Ambos tienen timestamp → gana el más reciente
          return local.updatedAt > o.updatedAt ? local : o;
        }
        if (local && local.updatedAt && !o.updatedAt) {
          // Solo el local tiene timestamp → fue modificado recientemente, conservar local
          return local;
        }
        // Sin timestamp → fallback: conservar estado más avanzado y pagado=true
        if (local) {
          const prioridad = { entregado:6, listo_retirar:5, listo_laboratorio:4, demorado:3, en_laboratorio:2, pendiente_envio:1 };
          if ((prioridad[local.estado]||0) > (prioridad[o.estado]||0)) o.estado = local.estado;
          if (local.pagado && !o.pagado) o.pagado = local.pagado;
        }
        return o;
      });
      // Agregar órdenes locales nuevas que aún no llegaron al sheet
      const remoteIds = new Set(orders.map(o => o.id));
      (D.orders||[]).forEach(o => { if (!remoteIds.has(o.id)) mergedOrders.push(o); });
      const orders2 = mergedOrders;
      // reasignar para compatibilidad con el resto del bloque
      orders.length = 0; orders2.forEach(x => orders.push(x));
      D.orders = orders;
      persistLocal();
      renderAll();
    }
    hideSyncIndicator(true);
  } catch(e) { console.warn("Sync error:", e); hideSyncIndicator(false); }
}

async function push(payload) {
  if (!navigator.onLine) {
    const q = JSON.parse(localStorage.getItem('olvision_queue') || '[]');
    q.push(payload);
    localStorage.setItem('olvision_queue', JSON.stringify(q));
    return;
  }
  try {
    await fetch(SHEETS_URL, {method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
  } catch {
    const q = JSON.parse(localStorage.getItem('olvision_queue') || '[]');
    q.push(payload);
    localStorage.setItem('olvision_queue', JSON.stringify(q));
  }
}

async function drainQueue() {
  const q = JSON.parse(localStorage.getItem('olvision_queue') || '[]');
  if (!q.length) return;
  localStorage.removeItem('olvision_queue');
  for (const payload of q) {
    try { await fetch(SHEETS_URL, {method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)}); } catch {}
  }
}

// Solo guarda localmente, sin subir a Sheets (para usar dentro de syncSheets y evitar loops)
function persistLocal() {
  try { localStorage.setItem("olvision_v3", JSON.stringify(D)); } catch{}
  updateCount();
}

function persist() {
  try { localStorage.setItem("olvision_v3", JSON.stringify(D)); } catch{}
  updateCount();
  // Solo subir a Sheets si hay órdenes (proteger contra borrado accidental)
  if (D.orders && D.orders.length > 0) {
    push({ type: "SYNC", data: D });
  }
}
function updateCount() {
  const cl = new Set(D.orders.map(o=>(o.nombre||"").trim().toLowerCase()).filter(Boolean)).size;
  document.getElementById("hcount").innerHTML = `${cl} clientes<br>${D.orders.length} órdenes`;
}

function addItem(key) {
  const input = document.getElementById("input-"+key);
  const val = input.value.trim();
  if (!val) return;
  const cfg = getCfg();
  if (cfg[key].includes(val)) { toast("Ya existe"); return; }
  cfg[key].push(val);
  saveCfg(cfg);
  input.value = "";
  renderConfig();
  toast("✅ Agregado");
}

function removeItem(key, idx) {
  const cfg = getCfg();
  const item = cfg[key][idx];
  if (!item) return;
  confirmarAccion("¿Eliminar \"" + item + "\" de la lista?", function() {
    cfg[key].splice(idx, 1);
    saveCfg(cfg);
    renderConfig();
    toast("🗑 Eliminado");
  });
}

function matchFecha(o, fil) {
  if (!fil) return true;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const d = o.fecha ? new Date(o.fecha+"T12:00:00") : null;
  if (!d) return false;
  if (fil==="hoy") return d>=hoy && d<new Date(hoy.getTime()+86400000);
  if (fil==="semana") { const s=new Date(hoy); s.setDate(hoy.getDate()-hoy.getDay()); return d>=s; }
  if (fil==="mes") return d.getMonth()===hoy.getMonth() && d.getFullYear()===hoy.getFullYear();
  return true;
}

function renderClientes(q="") {
  const el = document.getElementById("lista-clientes");

  const map = new Map();
  D.orders.forEach(o => {
    const nombre = (o.nombre||"").trim();
    const k = nombre.toLowerCase() || (o.dni||"").trim();
    if(!k)return;
    if(!map.has(k)) map.set(k,{nombre:nombre||o.dni||"Sin nombre",cel:o.cel,dni:o.dni,orders:[]});
    map.get(k).orders.push(o);
  });
  let list=[...map.values()].sort((a,b)=>a.nombre.localeCompare(b.nombre,"es",{sensitivity:"base"}));
  if(q) list=list.filter(c=>c.nombre.toLowerCase().includes(q.toLowerCase())||(c.cel||"").includes(q)||(c.dni||"").includes(q));
  if(!list.length){
    el.innerHTML=`<div class="empty"><span>👤</span>${D.orders.length===0?"Cargá órdenes para ver los clientes":"Sin resultados"}</div>`;
    if(sidebar) sidebar.innerHTML="";
    return;
  }

  // Agrupar por letra inicial
  const byLetter = {};
  list.forEach(c => {
    const letra = c.nombre.trim()[0]?.toUpperCase().replace(/[ÁÀÂÄ]/g,"A").replace(/[ÉÈÊË]/g,"E").replace(/[ÍÌÎÏ]/g,"I").replace(/[ÓÒÔÖ]/g,"O").replace(/[ÚÙÛÜ]/g,"U") || "#";
    if(!byLetter[letra]) byLetter[letra] = [];
    byLetter[letra].push(c);
  });
  const letrasPresentes = Object.keys(byLetter).sort();

  // Render lista agrupada
  el.innerHTML = letrasPresentes.map(letra => `
    <div id="az-${letra}" style="scroll-margin-top:70px">

            <div style="font-size:22px;color:var(--gris-borde);flex-shrink:0">›</div>

  }
}

// ── ESTADÍSTICAS ─────────────────────────────────────────────────────────────
function renderStats() {
  const el = document.getElementById("stats-body");
  const hoy = new Date();
  const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const mesActual = hoy.getMonth();
  const anioActual = hoy.getFullYear();

  const selMes  = parseInt(document.getElementById("stats-mes")?.value  ?? mesActual);
  const selAnio = parseInt(document.getElementById("stats-anio")?.value ?? anioActual);
  const cmpOn   = document.getElementById("stats-cmp")?.checked || false;

  // Mes anterior para comparativa
  const prevMes  = selMes === 0 ? 11 : selMes - 1;
  const prevAnio = selMes === 0 ? selAnio - 1 : selAnio;

  const filtrar = (mes, anio) => D.orders.filter(o => {
    if (!o.fecha) return false;
    const d = new Date(o.fecha + "T12:00:00");
    return d.getMonth() === mes && d.getFullYear() === anio;
  });

  const stats = (ords) => {
    const totalFacturado = ords.reduce((a,o) => a + (parseFloat(o.total)||0), 0);
    const ticket = ords.length ? totalFacturado / ords.length : 0;
    const pagadas = ords.filter(o => o.pagado).length;
    const ctaCte  = ords.filter(o => o.ctaCte).length;
    const sinCargo = ords.filter(o => o.formaPago === "Sin cargo").length;
    const pagoCounts = {}, tratCounts = {}, lenteCounts = {}, trabajoCounts = {}, osCounts = {};
    ords.forEach(o => {
      if(o.formaPago) pagoCounts[o.formaPago] = (pagoCounts[o.formaPago]||0)+1;
      if(o.tratamiento) tratCounts[o.tratamiento] = (tratCounts[o.tratamiento]||0)+1;
      if(o.tipos) o.tipos.split(",").filter(Boolean).forEach(t => { lenteCounts[t] = (lenteCounts[t]||0)+1; });
      if(o.tipoTrabajo) trabajoCounts[o.tipoTrabajo] = (trabajoCounts[o.tipoTrabajo]||0)+1;
      if(o.oSocial) osCounts[o.oSocial] = (osCounts[o.oSocial]||0)+1;
    });
    return { totalFacturado, ticket, pagadas, ctaCte, sinCargo, pagoCounts, tratCounts, lenteCounts, trabajoCounts, osCounts, count: ords.length };
  };

  const cur  = stats(filtrar(selMes, selAnio));
  const prev = cmpOn ? stats(filtrar(prevMes, prevAnio)) : null;

  const anios = [...new Set(D.orders.map(o => o.fecha ? new Date(o.fecha+"T12:00:00").getFullYear() : null).filter(Boolean))].sort((a,b)=>b-a);
  if (!anios.includes(anioActual)) anios.unshift(anioActual);

  const delta = (cur, prev) => {
    if (!prev || prev === 0) return "";
    const pct = Math.round((cur - prev) / prev * 100);
    const color = pct >= 0 ? "#2E7D32" : "#C62828";
    const arrow = pct >= 0 ? "▲" : "▼";
    return `<span style="font-size:11px;font-weight:800;color:${color};margin-left:6px">${arrow} ${Math.abs(pct)}%</span>`;
  };

  const barChart = (counts, color, prevCounts) => {
    const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    const max = entries[0]?.[1] || 1;
    return entries.map(([k,v]) => {
      const pv = prevCounts?.[k] || 0;
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
          <span style="font-weight:600">${k}</span>
          <span style="font-weight:800;color:${color}">${v}${prevCounts ? `<span style="font-size:11px;color:#999;font-weight:400"> vs ${pv}</span>` : ""}${delta(v, pv)}</span>
        </div>
        <div style="background:#eee;border-radius:6px;height:8px">
          <div style="background:${color};width:${Math.round(v/max*100)}%;height:8px;border-radius:6px"></div>
        </div>
      </div>`;
    }).join("") || `<div style="color:var(--suave);font-size:13px">Sin datos</div>`;
  };

  const kpi = (label, cur, prev, prefix="", big=false) => `
    <div style="text-align:center;padding:${big?"16px 10px":"12px 6px"}">
      <div style="font-size:10px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.5px">${label}</div>
      <div style="font-size:${big?"26px":"22px"};font-weight:900;color:var(--azul)">${prefix}${typeof cur==="number"&&cur>999?num(cur.toFixed(0)):cur}</div>
      ${prev!==undefined&&prev!==null ? `<div style="font-size:11px;color:var(--suave)">${prefix}${typeof prev==="number"&&prev>999?num(prev.toFixed(0)):prev} mes ant.${delta(cur,prev)}</div>` : ""}
    </div>`;

  el.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
      <select id="stats-mes" onchange="renderStats()" style="flex:1;border:1.5px solid var(--gris-borde);border-radius:9px;padding:10px;font-size:14px;background:var(--blanco);font-family:inherit;outline:none;-webkit-appearance:none">
        ${meses.map((m,i)=>`<option value="${i}" ${i===selMes?"selected":""}>${m}</option>`).join("")}
      </select>
      <select id="stats-anio" onchange="renderStats()" style="flex:0 0 90px;border:1.5px solid var(--gris-borde);border-radius:9px;padding:10px;font-size:14px;background:var(--blanco);font-family:inherit;outline:none;-webkit-appearance:none">
        ${anios.map(a=>`<option value="${a}" ${a===selAnio?"selected":""}>${a}</option>`).join("")}
      </select>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--azul);cursor:pointer;white-space:nowrap">
        <input type="checkbox" id="stats-cmp" onchange="renderStats()" ${cmpOn?"checked":""}> vs mes ant.
      </label>
    </div>

    ${cmpOn ? `<div style="display:flex;gap:6px;margin-bottom:10px">
      <div style="flex:1;background:var(--azul);color:#fff;border-radius:10px;padding:6px 10px;text-align:center;font-size:12px;font-weight:800">${meses[selMes]}</div>
      <div style="flex:1;background:var(--gris-borde);color:var(--texto);border-radius:10px;padding:6px 10px;text-align:center;font-size:12px;font-weight:800">${meses[prevMes]}</div>
    </div>` : ""}

    <div class="card" style="margin-bottom:10px;background:#E8F5E9">
      ${kpi("Total facturado", cur.totalFacturado, cmpOn?prev.totalFacturado:null, "$", true)}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div class="card">${kpi("Órdenes", cur.count, cmpOn?prev.count:null)}</div>
      <div class="card">${kpi("Ticket promedio", cur.ticket, cmpOn?prev.ticket:null, "$")}</div>
      <div class="card">${kpi("Pagadas", cur.pagadas, cmpOn?prev.pagadas:null)}</div>
      <div class="card">${kpi("Cta. Cte.", cur.ctaCte, cmpOn?prev.ctaCte:null)}</div>
    </div>

    <div class="card" style="margin-bottom:10px">
      <div class="fsec-tit" style="margin-bottom:12px">💳 Formas de pago</div>
      ${barChart(cur.pagoCounts, "#1B4FA8", cmpOn?prev.pagoCounts:null)}
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="fsec-tit" style="margin-bottom:12px">✨ Tratamientos</div>
      ${barChart(cur.tratCounts, "#6A1B9A", cmpOn?prev.tratCounts:null)}
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="fsec-tit" style="margin-bottom:12px">🔭 Tipos de lente</div>
      ${barChart(cur.lenteCounts, "#1565C0", cmpOn?prev.lenteCounts:null)}
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="fsec-tit" style="margin-bottom:12px">📌 Tipo de trabajo</div>
      ${barChart(cur.trabajoCounts, "#2E7D32", cmpOn?prev.trabajoCounts:null)}
    </div>
    ${Object.keys(cur.osCounts).length ? `<div class="card" style="margin-bottom:10px">
      <div class="fsec-tit" style="margin-bottom:12px">🏥 Obras sociales</div>
      ${barChart(cur.osCounts, "#E65100", cmpOn?prev.osCounts:null)}
    </div>` : ""}

    ${renderVendedorasStats(selMes, selAnio, cmpOn, prevMes, prevAnio)}
    ${renderRentabilidadStats(selMes, selAnio)}
    ${renderOrdenesAlerta()}

    <div style="height:20px"></div>
  `;
}

// ── VENTAS POR VENDEDORA ──────────────────────────────────────
function renderVendedorasStats(mes, anio, cmpOn, prevMes, prevAnio) {
  const ordenesDelMes = (m, a) => D.orders.filter(o => {
    if (!o.fecha) return false;
    const d = new Date(o.fecha+"T12:00:00");
    return d.getMonth()===m && d.getFullYear()===a;
  });
  const ventasDelMes = (m, a) => {
    const desde = new Date(a, m, 1).toISOString().slice(0,10);
    const hasta  = new Date(a, m+1, 0).toISOString().slice(0,10);
    return getCajasVentas().filter(v => v.fecha >= desde && v.fecha <= hasta);
  };

  const cur  = ordenesDelMes(mes, anio);
  const prev = cmpOn ? ordenesDelMes(prevMes, prevAnio) : [];
  const curV = ventasDelMes(mes, anio);
  const prevV = cmpOn ? ventasDelMes(prevMes, prevAnio) : [];

  const mapVendedora = (ords, ventas) => {
    const m = {};
    ords.filter(o=>o.vendedora).forEach(o => {
      const k = o.vendedora.trim();
      if (!m[k]) m[k] = { ordenes:0, facturado:0, ventas:0, totalVentas:0 };
      m[k].ordenes++;
      m[k].facturado += parseFloat(o.total)||0;
    });
    ventas.filter(v=>v.vendedora).forEach(v => {
      const k = v.vendedora.trim();
      if (!m[k]) m[k] = { ordenes:0, facturado:0, ventas:0, totalVentas:0 };
      m[k].ventas++;
      m[k].totalVentas += v.total||0;
    });
    return m;
  };

  const curMap  = mapVendedora(cur, curV);
  const prevMap = cmpOn ? mapVendedora(prev, prevV) : {};

  const entries = Object.entries(curMap).sort((a,b) => (b[1].facturado+b[1].totalVentas) - (a[1].facturado+a[1].totalVentas));
  if (!entries.length) return "";

  const rows = entries.map(([nombre, d]) => {
    const total = d.facturado + d.totalVentas;
    const pTotal = prevMap[nombre] ? prevMap[nombre].facturado + prevMap[nombre].totalVentas : null;
    const pct = pTotal ? Math.round((total-pTotal)/pTotal*100) : null;
    const badge = pct!==null ? `<span style="font-size:11px;font-weight:800;color:${pct>=0?'#2E7D32':'#C62828'}">${pct>=0?'▲':'▼'}${Math.abs(pct)}%</span>` : "";
    return `<div style="padding:10px 0;border-bottom:1px solid var(--gris-borde)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:800;font-size:14px">👤 ${nombre}</div>
          <div style="font-size:12px;color:var(--suave);margin-top:2px">${d.ordenes} órd. · ${d.ventas} ventas rápidas</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:900;font-size:15px;color:var(--azul)">$${num(total)}</div>
          ${badge}
        </div>
      </div>
    </div>`;
  }).join("");

  return `<div class="card" style="margin-bottom:10px">
    <div class="fsec-tit" style="margin-bottom:4px">👥 Ventas por vendedora</div>
    ${rows}
  </div>`;
}

// ── RENTABILIDAD ──────────────────────────────────────────────
function renderRentabilidadStats(mes, anio) {
  const ordenes = D.orders.filter(o => {
    if (!o.fecha||!o.costo||!o.total) return false;
    const d = new Date(o.fecha+"T12:00:00");
    return d.getMonth()===mes && d.getFullYear()===anio;
  });
  if (!ordenes.length) return `<div class="card" style="margin-bottom:10px;opacity:.6">
    <div class="fsec-tit" style="margin-bottom:6px">💰 Rentabilidad</div>
    <div style="font-size:13px;color:var(--suave)">Cargá el costo en las órdenes del mes para ver el margen de ganancia.</div>
  </div>`;

  const totalVenta = ordenes.reduce((a,o)=>a+(parseFloat(o.total)||0),0);
  const totalCosto = ordenes.reduce((a,o)=>a+(parseFloat(o.costo)||0),0);
  const ganancia   = totalVenta - totalCosto;
  const margen     = totalVenta ? Math.round(ganancia/totalVenta*100) : 0;

  // Top rentables
  const top = [...ordenes].map(o => ({
    nombre: o.nombre, num: o.num,
    venta: parseFloat(o.total)||0,
    costo: parseFloat(o.costo)||0,
    ganancia: (parseFloat(o.total)||0)-(parseFloat(o.costo)||0),
    margen: Math.round(((parseFloat(o.total)||0)-(parseFloat(o.costo)||0))/(parseFloat(o.total)||1)*100)
  })).sort((a,b)=>b.ganancia-a.ganancia).slice(0,5);

  return `<div class="card" style="margin-bottom:10px">
    <div class="fsec-tit" style="margin-bottom:12px">💰 Rentabilidad</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="text-align:center;background:#E8F5E9;border-radius:10px;padding:10px">
        <div style="font-size:10px;font-weight:700;color:#2E7D32;text-transform:uppercase">Ganancia</div>
        <div style="font-size:18px;font-weight:900;color:#2E7D32">$${num(ganancia.toFixed(0))}</div>
      </div>
      <div style="text-align:center;background:#E3F2FD;border-radius:10px;padding:10px">
        <div style="font-size:10px;font-weight:700;color:#1565C0;text-transform:uppercase">Costo</div>
        <div style="font-size:18px;font-weight:900;color:#1565C0">$${num(totalCosto.toFixed(0))}</div>
      </div>
      <div style="text-align:center;background:${margen>=50?'#E8F5E9':margen>=30?'#FFF8E1':'#FDECEA'};border-radius:10px;padding:10px">
        <div style="font-size:10px;font-weight:700;color:var(--suave);text-transform:uppercase">Margen</div>
        <div style="font-size:22px;font-weight:900;color:${margen>=50?'#2E7D32':margen>=30?'#F57F17':'#C62828'}">${margen}%</div>
      </div>
    </div>
    <div style="font-size:11px;font-weight:800;color:var(--suave);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Top órdenes más rentables</div>
    ${top.map(o=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gris-borde)">
      <div>
        <div style="font-weight:700;font-size:13px">${o.nombre||"—"} <span style="color:var(--suave);font-weight:400">N°${o.num}</span></div>
        <div style="font-size:11px;color:var(--suave)">Venta $${num(o.venta)} · Costo $${num(o.costo)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:900;color:#2E7D32;font-size:14px">+$${num(o.ganancia.toFixed(0))}</div>
        <div style="font-size:11px;color:var(--suave)">${o.margen}% margen</div>
      </div>
    </div>`).join("")}
    <div style="font-size:11px;color:var(--suave);margin-top:8px">* Solo incluye órdenes con costo cargado (${ordenes.length} de ${D.orders.filter(o=>{const d=new Date((o.fecha||"")+"T12:00:00");return d.getMonth()===mes&&d.getFullYear()===anio;}).length})</div>
  </div>`;
}

// ── ALERTAS: ÓRDENES SIN RETIRAR Y DEUDA ─────────────────────
function renderOrdenesAlerta() {
  const hoy = new Date(); hoy.setHours(0,0,0,0);

  // Órdenes sin retirar: pagadas hace +7 días (no tienen fecha de retiro, usamos fecha orden)
  const sinRetirar = D.orders.filter(o => {
    if (!o.pagado || !o.fecha) return false;
    const d = new Date(o.fecha+"T12:00:00");
    const dias = Math.floor((hoy-d)/86400000);
    return dias >= 7 && !o.retirado;
  }).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

  // Deuda: cta cte ordenada por monto
  const deudas = D.orders.filter(o=>o.ctaCte&&o.saldo&&parseFloat(o.saldo)>0)
    .map(o=>({...o, saldoN: parseFloat(o.saldo)}))
    .sort((a,b)=>b.saldoN-a.saldoN);

  const totalDeuda = deudas.reduce((a,o)=>a+o.saldoN,0);

  return `
    ${sinRetirar.length ? `<div class="card" style="margin-bottom:10px;border-left:4px solid #F57F17">
      <div class="fsec-tit" style="margin-bottom:10px;color:#E65100">⏰ Sin retirar hace +7 días (${sinRetirar.length})</div>
      ${sinRetirar.slice(0,5).map(o=>{
        const idx = D.orders.findIndex(x=>x.id===o.id);
        const dias = Math.floor((hoy-new Date(o.fecha+"T12:00:00"))/86400000);
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gris-borde)">
          <div>
            <div style="font-weight:700;font-size:14px">${o.nombre||"—"}</div>
            <div style="font-size:12px;color:var(--suave)">${fmtDate(o.fecha)} · hace ${dias} días</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            ${o.cel?`<a href="https://wa.me/549${String(o.cel||'').replace(/[^0-9]/g,'')}" target="_blank" style="background:#E7F9EE;color:#25D366;border-radius:7px;padding:6px 10px;font-size:12px;font-weight:700;text-decoration:none">📲</a>`:""}
            <button onclick="marcarRetirado(${idx})" class="btn-green" style="font-size:12px;padding:6px 10px">✅ Retiró</button>
          </div>
        </div>`;
      }).join("")}
      ${sinRetirar.length>5?`<div style="font-size:12px;color:var(--suave);padding:6px 0">+ ${sinRetirar.length-5} más...</div>`:""}
    </div>` : ""}

    ${deudas.length ? `<div class="card" style="margin-bottom:10px;border-left:4px solid #E65100">
      <div class="fsec-tit" style="margin-bottom:4px;color:#E65100">📒 Deuda por cliente</div>
      <div style="font-size:13px;font-weight:900;color:#E65100;margin-bottom:10px">Total: $${num(totalDeuda.toFixed(0))}</div>
      ${deudas.slice(0,8).map(o=>{
        const idx = D.orders.findIndex(x=>x.id===o.id);
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gris-borde)">
          <div>
            <div style="font-weight:700;font-size:14px">${o.nombre||"—"}</div>
            <div style="font-size:12px;color:var(--suave)">N°${o.num} · ${fmtDate(o.fecha)}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <div style="font-weight:900;color:#E65100;font-size:15px">$${num(o.saldoN.toFixed(0))}</div>
            ${o.cel?`<a href="https://wa.me/549${String(o.cel||'').replace(/[^0-9]/g,'')}" target="_blank" style="background:#E7F9EE;color:#25D366;border-radius:7px;padding:6px 10px;font-size:12px;font-weight:700;text-decoration:none">📲</a>`:""}
          </div>
        </div>`;
      }).join("")}
      ${deudas.length>8?`<div style="font-size:12px;color:var(--suave);padding:6px 0">+ ${deudas.length-8} más en Cta.Cte</div>`:""}
    </div>` : ""}
  `;
}

function marcarRetirado(idx) {
  confirmarAccion("¿Marcar la orden como retirada?", function() {
    D.orders[idx].estado = "entregado";
    const o = D.orders[idx];
    const saldo = parseFloat(o.saldo||0) || (parseFloat(o.total||0) - parseFloat(o.aCuenta||0));
    if (saldo <= 0) D.orders[idx].pagado = true;
    D.orders[idx].updatedAt = Date.now();
    persist();
    renderAll();
    closeModal();
    toast("✅ Marcada como retirada");
  });
}


// ── FIDELIZACIÓN ──────────────────────────────────────────────────────────────
function buscarGlobal(q) {
  const el = document.getElementById("resultados-global");
  if (!q || q.length < 2) { el.innerHTML = ""; return; }
  const ql = q.toLowerCase();
  const results = D.orders.filter(o =>
    (o.nombre||"").toLowerCase().includes(ql) ||
    (o.dni||"").toString().includes(q) ||
    String(o.num).includes(q) ||
    (o.cel||"").toString().includes(q) ||
    (o.tratamiento||"").toLowerCase().includes(ql) ||
    (o.oSocial||"").toLowerCase().includes(ql) ||
    (o.doctor||"").toLowerCase().includes(ql) ||
    (o.notas||"").toLowerCase().includes(ql)
  ).sort((a,b)=>String(b.num).localeCompare(String(a.num),undefined,{numeric:true})).slice(0,10);

  if (!results.length) { el.innerHTML = '<div style="color:rgba(255,255,255,.6);font-size:13px;padding:6px 4px">Sin resultados</div>'; return; }
  el.innerHTML = results.map(o => {
    const idx = D.orders.findIndex(x => x.id === o.id);
    return `<div onclick="document.getElementById('q-global').value='';document.getElementById('resultados-global').innerHTML='';verDetalle(${idx})" style="background:var(--blanco);border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:10px">
      <div style="background:var(--azul);color:var(--amarillo);font-size:11px;font-weight:900;padding:5px 7px;border-radius:8px;text-align:center;min-width:40px;flex-shrink:0">
        <div>#${o.num}</div>
        <div style="font-size:9px;opacity:.8">${fmtDate(o.fecha)}</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.nombre||"—"}</div>
        <div style="font-size:11px;color:var(--suave);margin-top:2px">
          ${o.dni?`🪪 ${o.dni} · `:""}${o.tratamiento||o.oSocial||""}
        </div>
      </div>
      <div style="font-size:18px;color:var(--gris-borde)">›</div>
    </div>`;
  }).join("");
}

// ── DASHBOARD ────────────────────────────────────────────────
function renderDashboard() {
  const hoy = new Date();
  const mes = hoy.getMonth(), anio = hoy.getFullYear();
  const mesAnterior = mes === 0 ? 11 : mes - 1;
  const anioAnterior = mes === 0 ? anio - 1 : anio;
  const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const mesesFull = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  const getOrdenesMes = (m, a) => D.orders.filter(o => {
    if (!o.fecha) return false;
    const d = new Date(o.fecha+"T12:00:00");
    return d.getMonth()===m && d.getFullYear()===a;
  });

  const curOrds  = getOrdenesMes(mes, anio);
  const prevOrds = getOrdenesMes(mesAnterior, anioAnterior);
  const hoyOrds  = D.orders.filter(o => o.fecha === getHoy());

  const facturaCur  = curOrds.reduce((a,o)=>a+(parseFloat(o.total)||0),0);
  const facturaPrev = prevOrds.reduce((a,o)=>a+(parseFloat(o.total)||0),0);
  const ticketCur   = curOrds.length ? facturaCur/curOrds.length : 0;
  const ticketPrev  = prevOrds.length ? facturaPrev/prevOrds.length : 0;

  // Clientes nuevos vs recurrentes
  const clientesPrevios = new Set(
    D.orders.filter(o=>{
      if(!o.fecha) return false;
      const d=new Date(o.fecha+"T12:00:00");
      return d < new Date(anio, mes, 1);
    }).map(o=>(o.nombre||"").toLowerCase().trim())
  );
  const nuevos     = curOrds.filter(o=>!clientesPrevios.has((o.nombre||"").toLowerCase().trim())).length;
  const recurrentes = curOrds.length - nuevos;

  // Gráfico últimos 6 meses
  const ultimos6 = Array.from({length:6},(_,i)=>{
    const m2 = ((mes - 5 + i) + 12) % 12;
    const a2 = anio + Math.floor((mes - 5 + i) / 12);
    const ords = getOrdenesMes(m2, a2);
    return { label: meses[m2], fact: ords.reduce((a,o)=>a+(parseFloat(o.total)||0),0), count: ords.length };
  });
  const maxFact = Math.max(...ultimos6.map(x=>x.fact), 1);

  const pctChange = (cur, prev) => {
    if (!prev) return null;
    return Math.round((cur-prev)/prev*100);
  };

  const kpiCard = (emoji, label, valor, prev, prefix="", color="#1B4FA8", darkBg="#1B2E54") => {
    const pct = pctChange(parseFloat(valor), parseFloat(prev));
    const badge = pct!==null ? `<div style="display:inline-flex;align-items:center;gap:3px;background:${pct>=0?'rgba(46,125,50,.15)':'rgba(198,40,40,.12)'};border:1px solid ${pct>=0?'rgba(46,125,50,.3)':'rgba(198,40,40,.3)'};border-radius:20px;padding:2px 8px;font-size:10px;font-weight:800;color:${pct>=0?'#4CAF50':'#EF5350'};margin-top:4px">${pct>=0?'▲':'▼'} ${Math.abs(pct)}%</div>` : "";
    return `<div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:16px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-10px;right:-10px;width:60px;height:60px;background:${color};opacity:.08;border-radius:50%"></div>
      <div style="font-size:22px;margin-bottom:8px">${emoji}</div>
      <div style="font-size:10px;font-weight:700;color:#F5E87C;text-transform:uppercase;letter-spacing:.8px">${label}</div>
      <div style="font-size:20px;font-weight:900;color:#fff;margin-top:4px;letter-spacing:-.5px">${prefix}${typeof valor==="number"?num(valor.toFixed(0)):valor}</div>
      ${badge}
    </div>`;
  };

  return `
    <!-- KPIs principales -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${kpiCard("💰","Facturación "+mesesFull[mes], facturaCur, facturaPrev, "$", "#4A9EFF")}
      ${kpiCard("🧾","Órdenes del mes", curOrds.length, prevOrds.length, "", "#34D399")}
      ${kpiCard("🎯","Ticket promedio", ticketCur, ticketPrev, "$", "#A78BFA")}
      ${kpiCard("📅","Órdenes hoy", hoyOrds.length, null, "", "#FB923C")}
    </div>

    <!-- Clientes nuevos vs recurrentes -->
    <div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:#F5E87C;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px">👥 Clientes este mes</div>
      <div style="display:flex;gap:10px">
        <div style="flex:1;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:9px;font-weight:800;color:#34D399;text-transform:uppercase;letter-spacing:.5px">Nuevos</div>
          <div style="font-size:28px;font-weight:900;color:#fff;margin-top:4px">${nuevos}</div>
        </div>
        <div style="flex:1;background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.2);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:9px;font-weight:800;color:#4A9EFF;text-transform:uppercase;letter-spacing:.5px">Recurrentes</div>
          <div style="font-size:28px;font-weight:900;color:#fff;margin-top:4px">${recurrentes}</div>
        </div>
        <div style="flex:1;background:rgba(245,232,124,.06);border:1px solid rgba(245,232,124,.15);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:9px;font-weight:800;color:#F5E87C;text-transform:uppercase;letter-spacing:.5px">Total</div>
          <div style="font-size:28px;font-weight:900;color:#fff;margin-top:4px">${curOrds.length}</div>
        </div>
      </div>
    </div>

    <!-- Gráfico 6 meses -->
    <div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:#F5E87C;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px">📈 Facturación últimos 6 meses</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:110px">
        ${ultimos6.map((m2,i)=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="font-size:9px;font-weight:700;color:${i===5?'#F5E87C':'rgba(255,255,255,.65)'}">${m2.fact>0?'$'+num(Math.round(m2.fact/1000))+'k':''}</div>
            <div style="width:100%;background:${i===5?'linear-gradient(180deg,#4A9EFF,#1B4FA8)':'rgba(74,158,255,.15)'};border-radius:5px 5px 0 0;height:${Math.max(m2.fact/maxFact*85,4)}px;transition:height .4s"></div>
            <div style="font-size:9px;color:rgba(255,255,255,.72);font-weight:600">${m2.label}</div>
          </div>`).join("")}
      </div>
    </div>

    <!-- Ritmo del mes -->
    <div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:12px">

// ── EQUIPO ────────────────────────────────────────────────────
function renderAdminEquipo() {
  const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const hoy = new Date();

  // Acumular por vendedora — todos los meses
  const vendMap = {};
  D.orders.filter(o=>o.vendedora).forEach(o => {
    const k = o.vendedora.trim();
    const d = o.fecha ? new Date(o.fecha+"T12:00:00") : null;
    const mk = d ? d.getMonth()+"-"+d.getFullYear() : null;
    if (!vendMap[k]) vendMap[k] = { total:0, ordenes:0, byMes:{} };
    vendMap[k].total   += parseFloat(o.total)||0;
    vendMap[k].ordenes += 1;
    if (mk) vendMap[k].byMes[mk] = (vendMap[k].byMes[mk]||0) + (parseFloat(o.total)||0);
  });
  getCajasVentas().filter(v=>v.vendedora).forEach(v => {
    const k = v.vendedora.trim();
    if (!vendMap[k]) vendMap[k] = { total:0, ordenes:0, byMes:{} };
    vendMap[k].total += v.total||0;
  });

  const entries = Object.entries(vendMap).sort((a,b)=>b[1].total-a[1].total);
  const mesCur = hoy.getMonth()+"-"+hoy.getFullYear();
  const mesPrev = (hoy.getMonth()===0?11:hoy.getMonth()-1)+"-"+(hoy.getMonth()===0?hoy.getFullYear()-1:hoy.getFullYear());

  if (!entries.length) return `<div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:40px 20px;text-align:center;color:rgba(255,255,255,.78)"><span style="font-size:36px;display:block;margin-bottom:10px">👥</span>Todavía no hay datos de vendedoras.<br>Completá el campo "Vendedora" al cargar órdenes.</div>`;

  // Últimos 6 meses para comparativa
  const ultimos6meses = Array.from({length:6},(_,i)=>{
    const offset = 5-i;
    const m = ((hoy.getMonth()-offset)+120)%12;
    const a = hoy.getFullYear()+Math.floor((hoy.getMonth()-offset)/12);
    return { key: m+"-"+a, label: ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][m] };
  });

  return `
    <!-- Ranking vendedoras -->
    <div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:#F5E87C;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px">🏆 Ranking general</div>
      ${entries.map(([nombre, d], i) => {
        const curMes = d.byMes[mesCur]||0;
        const prevMes = d.byMes[mesPrev]||0;
        const pct = prevMes ? Math.round((curMes-prevMes)/prevMes*100) : null;
        const medals = ["🥇","🥈","🥉"];
        const accentColors = ["#F5E87C","rgba(255,255,255,.5)","rgba(180,120,60,.8)"];
        return `<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:36px;height:36px;background:rgba(255,255,255,.06);border:1px solid ${accentColors[i]||'rgba(255,255,255,.1)'};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px">${medals[i]||"👤"}</div>
            <div>
              <div style="font-weight:800;font-size:14px;color:#fff">${nombre}</div>
              <div style="font-size:11px;color:rgba(255,255,255,.78)">${d.ordenes} órdenes totales</div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:900;font-size:15px;color:#4A9EFF">$${num(d.total.toFixed(0))}</div>
            <div style="font-size:10px;color:rgba(255,255,255,.78)">Este mes: $${num(curMes.toFixed(0))}</div>
            ${pct!==null?`<div style="font-size:10px;font-weight:800;color:${pct>=0?'#34D399':'#EF5350'}">${pct>=0?'▲':'▼'}${Math.abs(pct)}%</div>`:""}
          </div>
        </div>`;
      }).join("")}
    </div>

    <!-- Comparativa por mes -->
    <div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:#F5E87C;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px">📊 Comparativa por vendedora (6 meses)</div>
      <div style="overflow-x:auto;scrollbar-width:none">
        <table style="width:100%;border-collapse:collapse;min-width:280px;font-size:12px">
          <tr>
            <th style="padding:8px 6px;text-align:left;font-size:10px;text-transform:uppercase;color:rgba(255,255,255,.35);font-weight:700;border-bottom:1px solid rgba(255,255,255,.08)">Vendedora</th>
            ${ultimos6meses.map(m2=>`<th style="padding:8px 4px;text-align:center;font-size:10px;color:rgba(255,255,255,.35);font-weight:700;border-bottom:1px solid rgba(255,255,255,.08)">${m2.label}</th>`).join("")}
          </tr>
          ${entries.map(([nombre, d])=>`
            <tr>
              <td style="padding:10px 6px;font-weight:700;color:#fff;white-space:nowrap">${nombre}</td>
              ${ultimos6meses.map(m2=>{
                const v = d.byMes[m2.key]||0;
                return `<td style="padding:10px 6px;text-align:center;color:${v>0?'#4A9EFF':'rgba(255,255,255,.2)'}">
                  ${v>0?'$'+num(Math.round(v/1000))+'k':'—'}
                </td>`;
              }).join("")}
            </tr>`).join("")}
        </table>
      </div>
    </div>
  `;
}

// ── PRODUCTOS ─────────────────────────────────────────────────
function renderAdminProductos() {
  const hoy = new Date();
  const mes = hoy.getMonth(), anio = hoy.getFullYear();

  const ordMes = D.orders.filter(o=>{
    if(!o.fecha) return false;
    const d=new Date(o.fecha+"T12:00:00");
    return d.getMonth()===mes && d.getFullYear()===anio;
  });
  const ordTotal = D.orders;

  // Tratamientos
  const tratMes={}, tratTotal={};
  ordMes.forEach(o=>{ if(o.tratamiento) tratMes[o.tratamiento]=(tratMes[o.tratamiento]||0)+1; });
  ordTotal.forEach(o=>{ if(o.tratamiento) tratTotal[o.tratamiento]=(tratTotal[o.tratamiento]||0)+1; });

  // Motores de venta (tipo trabajo)
  const motorMes={}, motorTotal={};
  ordMes.forEach(o=>{ if(o.tipoTrabajo) motorMes[o.tipoTrabajo]=(motorMes[o.tipoTrabajo]||0)+1; });
  ordTotal.forEach(o=>{ if(o.tipoTrabajo) motorTotal[o.tipoTrabajo]=(motorTotal[o.tipoTrabajo]||0)+1; });

  // Obras sociales
  const osMes={};
  ordMes.forEach(o=>{ if(o.oSocial) osMes[o.oSocial]=(osMes[o.oSocial]||0)+1; });

  const barras = (counts, color, total) => {
    const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);

        <div style="background:rgba(255,255,255,.06);border-radius:6px;height:7px;overflow:hidden">
          <div style="background:${color};width:${Math.round(v/max*100)}%;height:7px;border-radius:6px;transition:width .4s"></div>
        </div>
      </div>`).join("") || `<div style="color:rgba(255,255,255,.6);font-size:13px">Sin datos este mes</div>`;
  };

  return `
    <div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:#F5E87C;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px">🚀 Motores de venta (este mes)</div>
      ${barras(motorMes, "#4A9EFF", ordMes.length||1)}
    </div>
    <div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:#F5E87C;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px">✨ Tratamientos más vendidos (este mes)</div>
      ${barras(tratMes, "#A78BFA", ordMes.length||1)}
    </div>
    <div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:#F5E87C;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px">🏥 Obras sociales (este mes)</div>
      ${barras(osMes, "#FB923C", ordMes.length||1)}
    </div>
    <div style="background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(74,158,255,.25);box-shadow:0 0 0 1px rgba(74,158,255,.1),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:#F5E87C;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px">✨ Tratamientos históricos (todos)</div>

// ── ÓRDENES CEO ───────────────────────────────────────────────
function renderAdminOrdenes() {
  const hoy = new Date(); hoy.setHours(0,0,0,0);

  // Sin retirar
  const sinRetirar = D.orders.filter(o=>{
    if(!o.pagado||!o.fecha) return false;
    const d=new Date(o.fecha+"T12:00:00");
    return Math.floor((hoy-d)/86400000)>=7 && !o.retirado;
  }).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

  // Deudas
  const deudas = D.orders.filter(o=>o.ctaCte&&o.saldo&&parseFloat(o.saldo)>0)
    .map(o=>({...o,saldoN:parseFloat(o.saldo)}))
    .sort((a,b)=>b.saldoN-a.saldoN);
  const totalDeuda = deudas.reduce((a,o)=>a+o.saldoN,0);

  // Top clientes por facturación
  const clienteMap = {};
  D.orders.forEach(o=>{
    const k=(o.nombre||"").trim().toLowerCase();
    if(!k) return;
    if(!clienteMap[k]) clienteMap[k]={nombre:o.nombre,total:0,ordenes:0,cel:o.cel};
    clienteMap[k].total += parseFloat(o.total)||0;
    clienteMap[k].ordenes++;
  });

function saveMensajes(m) {
  localStorage.setItem("olvision_mensajes", JSON.stringify(m));

function editMensaje(i, val) {
  const msgs = getMensajes();
  msgs[i].texto = val;
  saveMensajes(msgs);
}

function agregarMensaje() {
  const nombre = document.getElementById("nuevo-msg-nombre")?.value.trim();
  const texto  = document.getElementById("nuevo-msg-texto")?.value.trim();
  if (!nombre) { toast("⚠ Ingresá un nombre para el mensaje"); return; }
  if (!texto)  { toast("⚠ Escribí el texto del mensaje"); return; }
  const msgs = getMensajes();
  msgs.push({ id:"custom_"+Date.now(), nombre, texto });
  saveMensajes(msgs);
  renderMensajes();
  toast("✅ Mensaje guardado");
}

function eliminarMensaje(i) {
  confirmarAccion("¿Eliminar este mensaje?", function() {
    const msgs = getMensajes();
    msgs.splice(i, 1);
    saveMensajes(msgs);
    renderMensajes();
    toast("🗑 Eliminado");
  });
}

function resetMensaje(i) {
  confirmarAccion("¿Restaurar el mensaje al texto original?", function() {
    const msgs = getMensajes();
    const def = DEFAULT_MENSAJES.find(d => d.id === msgs[i]?.id);
    if (def) { msgs[i].texto = def.texto; saveMensajes(msgs); renderMensajes(); toast("↺ Restaurado"); }
  });
}

function copiarMensaje(i) {
  const msgs = getMensajes();
  const texto = msgs[i].texto.replace(/\{nombre\}/g, "");
  navigator.clipboard?.writeText(texto).then(()=>toast("📋 Copiado!")).catch(()=>toast("Seleccioná el texto y copiá manualmente"));
}

function enviarWhatsApp(i) {
  const msgs = getMensajes();
  const texto = msgs[i].texto.replace(/\{nombre\}/g, "");
  window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
}

// Desde la ficha de cliente — enviar mensaje a cliente específico
function enviarMensajeCliente(nombre, cel) {
  const msgs = getMensajes();
  const num = String(cel||"").replace(/[^0-9]/g,"");
  const opciones = msgs.map((m,i) => `
    <div onclick="enviarMsgA(${i},'${encodeURIComponent(nombre)}','${num}')" style="background:var(--gris);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border:1.5px solid var(--gris-borde)" onmouseenter="this.style.background='#E8EFF9'" onmouseleave="this.style.background='var(--gris)'">
      <div style="font-weight:800;font-size:14px;margin-bottom:4px">${m.nombre}</div>
      <div style="font-size:12px;color:var(--suave);line-height:1.4">${m.texto.replace(/\{nombre\}/g, nombre).slice(0,80)}...</div>
    </div>`).join("");

  document.getElementById("modal-body").innerHTML = `
    <div style="font-size:18px;font-weight:900;margin-bottom:4px">💬 Enviar mensaje</div>
    <div style="font-size:13px;color:var(--suave);margin-bottom:16px">a ${nombre}</div>
    ${opciones}
    <button class="btn-cancel" onclick="closeModal()">← Cancelar</button>
  `;
  document.getElementById("overlay").classList.add("open");
}

function enviarMsgDirecto(templateId, nombreEnc, celRaw) {
  const msgs = getMensajes();
  const m = msgs.find(x => x.id === templateId);
  if (!m) { enviarMensajeCliente(decodeURIComponent(nombreEnc), celRaw); return; }
  const nombre = decodeURIComponent(nombreEnc);
  const texto = m.texto.replace(/\{nombre\}/g, nombre);
  const cel = String(celRaw||"").replace(/[^0-9]/g,"");
  if (cel) window.open("https://wa.me/549" + cel + "?text=" + encodeURIComponent(texto), "_blank");
  else { navigator.clipboard?.writeText(texto); toast("📋 Copiado (sin número)"); }
}

function enviarMsgA(i, nombreEnc, celNum) {
  const msgs = getMensajes();
  const nombre = decodeURIComponent(nombreEnc);
  const texto = msgs[i].texto.replace(/\{nombre\}/g, nombre);
  closeModal();
  if (celNum) window.open("https://wa.me/549" + celNum + "?text=" + encodeURIComponent(texto), "_blank");
  else { navigator.clipboard?.writeText(texto); toast("📋 Copiado (sin número)"); }
}

// Fecha local — evita bug UTC vs Argentina (después de las 21hs cambia de día en UTC)
function getHoy() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getCajas() {
  try { const s = localStorage.getItem("olvision_cajas"); return s ? JSON.parse(s) : []; } catch { return []; }
}
function saveCajas(c) {
  localStorage.setItem("olvision_cajas", JSON.stringify(c));
  if (c && c.length > 0) push({ type: "SAVE_DATA", key: "CAJAS", value: JSON.stringify(c) });
}

function getCajaHoy() {
  const hoy = getHoy();
  return getCajas().find(c => c.fecha === hoy) || null;
}

function renderSaldosPendientesHtml() {
  const lista = D.orders
    .map((o,i) => ({...o, _idx: i}))
    .filter(o => {
      if (o.pagado) return false;
      const t = parseFloat(o.total)||0;
      const a = parseFloat(o.aCuenta)||0;
      const s = parseFloat(o.saldo||0);
      return t > 0 && (s > 0 || a < t);
    })
    .sort((a,b) => String(b.num).localeCompare(String(a.num), undefined, {numeric:true}));

  if (!lista.length) return "";

  let h = "<div style='font-size:11px;font-weight:800;color:#E65100;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;padding:0 2px'>💰 Saldos pendientes (" + lista.length + ")</div>";

  lista.forEach(function(o) {
    const total   = parseFloat(o.total)||0;
    const acuenta = parseFloat(o.aCuenta)||0;
    const saldo   = total - acuenta;
    const nom_    = encodeURIComponent(o.nombre||"");
    const cel_    = String(o.cel||"");

      ? "<button onclick='enviarMensajeCliente(\"" + nom_ + "\",\"" + cel_ + "\")' class='btn-wa' style='padding:8px 12px;font-size:13px'>📲</button>"
      : "";

      +   "<div style='display:flex;justify-content:space-between;align-items:center'>"
      +     "<div>"
      +       "<div style='font-weight:900;font-size:14px'>" + (o.nombre||"—") + " <span style='font-size:11px;color:var(--suave);font-weight:400'>N°" + (o.num||"") + "</span></div>"
      +       "<div style='font-size:12px;color:var(--suave);margin-top:3px'>Total $" + num(total) + " · A cuenta $" + num(acuenta) + "</div>"
      +     "</div>"
      +     "<div style='text-align:right'>"
      +       "<div style='font-size:17px;font-weight:900;color:#E65100'>$" + num(saldo) + "</div>"
      +       "<div style='font-size:10px;color:var(--suave)'>saldo</div>"
      +     "</div>"
      +   "</div>"
      +   "<div style='display:flex;gap:8px;margin-top:8px'>"

      +     "<button onclick='verDetalle(" + o._idx + ")' class='btn-blue' style='padding:8px 12px;font-size:13px'>Ver</button>"
      +     waBtn
      +   "</div>"
      + "</div>";
  });
  return h;
}

function renderPendientes() {
  const el = document.getElementById("pendientes-body");
  const hoyStr = getHoy();

  // Fallback: órdenes sin estado (datos viejos en memoria)
  D.orders.forEach(o => { if (!o.estado) o.estado = 'pendiente_envio'; });

  // Filtrar NO entregadas, O entregadas con saldo/pago pendiente
  const tieneSaldoPendiente = (o) => {
    if (o.pagado) return false;
    const total   = parseFloat(o.total||0);
    const aCuenta = parseFloat(o.aCuenta||0);
    const saldo   = parseFloat(o.saldo||0);
    return saldo > 0 || (total > 0 && aCuenta < total);
  };
  const pendientes = D.orders.filter(o => o.estado !== 'entregado' || tieneSaldoPendiente(o));

  if (!pendientes.length) {
    el.innerHTML = `<div class="empty"><span>🎉</span>¡Todo entregado!<br>No hay órdenes pendientes.</div>`;
    return;
  }

  // Agrupar por laboratorio
  const porLab = {};
  const sinLab = [];
  pendientes.forEach(o => {
    const lab = (o.laboratorio||"").trim();
    if (!lab) { sinLab.push(o); return; }
    if (!porLab[lab]) porLab[lab] = [];
    porLab[lab].push(o);
  });

  // Orden de urgencia de estados
  const prioridad = { demorado:0, listo_laboratorio:1, listo_retirar:2, en_laboratorio:3, pendiente_envio:4 };
  const sortOrds = (ords) => ords.sort((a,b) => (prioridad[a.estado]??5) - (prioridad[b.estado]??5));

  const renderOrdenPendiente = (o) => {
    const idx = D.orders.findIndex(x=>x.id===o.id);
    const e   = ESTADOS[o.estado] || ESTADOS.pendiente_envio;
    const dias = o.fecha ? Math.floor((new Date()-new Date(o.fecha+"T12:00:00"))/86400000) : null;
    const vencido = o.fechaEntrega && o.fechaEntrega < hoyStr;
    const saldoCalc = parseFloat(o.saldo||0) || (parseFloat(o.total||0) - parseFloat(o.aCuenta||0));
    const haySaldo = !o.pagado && saldoCalc > 0;
    const borderColor = haySaldo ? '#E65100' : e.color;

    return `<div style="background:#fff;border-radius:12px;padding:12px;margin-bottom:8px;border-left:4px solid ${borderColor};box-shadow:0 1px 4px rgba(0,0,0,.06)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-weight:900;font-size:14px">${o.nombre||"—"}</span>
            <span style="font-size:11px;color:var(--suave)">N°${o.num||"—"}</span>
            ${vencido?'<span style="font-size:10px;font-weight:800;color:#C62828;background:#FDECEA;border-radius:20px;padding:1px 7px">⏰ Vencido</span>':""}

  el.innerHTML = `<div style="padding:12px 12px 80px">${html}</div>`;

function cobrarSaldo() {
  // Órdenes con saldo > 0
  const conSaldo = D.orders
    .map((o,i) => ({...o, _idx: i}))
    .filter(o => {
      if (o.pagado) return false;
      const total = parseFloat(o.total)||0;
      const acuenta = parseFloat(o.aCuenta)||0;
      const saldo = parseFloat(o.saldo||0);
      return total > 0 && (saldo > 0 || acuenta < total);
    })
    .sort((a,b) => String(b.num).localeCompare(String(a.num), undefined, {numeric:true}));

  document.getElementById("modal-body").innerHTML = `
    <div style="font-size:20px;font-weight:900;color:#1B5E20;margin-bottom:4px">💰 Cobrar saldo</div>

}

function filtrarSaldos(q) {
  const conSaldo = D.orders
    .map((o,i) => ({...o, _idx: i}))
    .filter(o => {
      if (o.pagado) return false;
      const total = parseFloat(o.total)||0;
      const acuenta = parseFloat(o.aCuenta)||0;
      const saldo = parseFloat(o.saldo||0);
      return total > 0 && (saldo > 0 || acuenta < total);
    });
  const filtrado = q
    ? conSaldo.filter(o =>
        (o.nombre||"").toLowerCase().includes(q.toLowerCase()) ||
        String(o.num||"").includes(q))
    : conSaldo;
  document.getElementById("lista-saldos").innerHTML = renderListaSaldos(filtrado);
}
